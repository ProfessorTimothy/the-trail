itics he refused to see. Ishiguro's Booker winner is the most precise study of self-deception in English fiction. The tragedy assembles itself politely, sentence by sentence, until it is unbearable.", "family": ["Tom"], "sources": ["Guardian Top 100", "Oxford Curated"], "awards": ["Booker Prize (1989)", "Nobel Prize (Ishiguro, 2017)"], "tags": ["Modern Classic", "Literary Fiction", "Historical Fiction"], "color": "stone"}, {"id": 126, "title": "London Fields", "author": "Martin Amis", "sortYear": 1989, "displayDate": "1989", "description": "Nicola Six knows she will be murdered on her thirty-fifth birthday and sets about arranging it, while a dying American writer takes notes. Amis at his most ambitious, orchestrating millennial dread, darts, and the dirtiest comic prose in English. A marmite book from a marmite writer. Readers who take to it tend to take to it completely.", "family": ["Tom"], "sources": [], "awards": [], "tags": ["Satire", "Literary Fiction", "Crime", "Comedy"], "color": "alpenglow"}, {"id": 127, "title": "The Pillars of the Earth", "author": "Ken Follett", "sortYear": 1989, "displayDate": "1989", "description": "The building of a twelfth century English cathedral becomes the spine of a vast epic of ambition, war, faith, and revenge across fifty years. Follett's masterpiece of popular historical fiction has converted millions of readers to the genre. A thousand pages that read themselves. The family's most reliable recommendation for anyone in a reading slump.", "family": ["Anne-Worley", "Amy"], "sources": [], "awards": [], "tags": ["Historical Fiction", "Epic", "Adventure"], "color": "sky"}, {"id": 128, "title": "Possession", "author": "A.S. Byatt", "sortYear": 1990, "displayDate": "1990", "description": "Two modern academics uncover a hidden love affair between two Victorian poets and find their own lives rearranged by the pursuit. Byatt's Booker winner is a romance, a detective story, a campus comedy, and an anthology of invented Victorian poetry good enough to pass for the real thing. The smartest love story of its generation.", "family": [], "sources": ["Oxford Curated"], "awards": ["Booker Prize (1990)"], "tags": ["Literary Fiction", "Romance", "Mystery"], "color": "lantern"}, {"id": 129, "title": "The Witching Hour", "author": "Anne Rice", "sortYear": 1990, "displayDate": "1990", "description": "A San Francisco neurosurgeon inherits a decaying New Orleans mansion and a family entangled for centuries with an entity called Lasher. Rice at her most expansive, layering Southern Gothic atmosphere over occult dynastic history. A thousand pages of velvet menace. Best consumed in deep summer with the ceiling fan turning slowly.", "family": ["Amy"], "sources": [], "awards": [], "tags": ["Gothic", "Horror", "Fantasy", "Family Saga", "Epic"], "color": "forest"}, {"id": 130, "title": "Full Catastrophe Living", "author": "Jon Kabat-Zinn", "sortYear": 1990, "displayDate": "1990", "description": "Kabat-Zinn took meditation out of the monastery and into a hospital basement in Massachusetts, teaching chronic-pain patients to be present to their own lives. The book that launched mindfulness into Western medicine, decades before the apps. Practical, unsentimental, and genuinely useful. The title comes from Zorba the Greek, which tells you its spirit.", "family": ["Allan"], "sources": [], "awards": [], "tags": ["Non-Fiction", "Faith & Spirit"], "color": "sunset"}, {"id": 131, "title": "The Firm", "author": "John Grisham", "sortYear": 1991, "displayDate": "1991", "description": "A Harvard Law graduate takes the highest offer on the table, from a small Memphis firm that pays too well, asks too much, and buries the associates who try to leave. Grisham invented the modern legal thriller here and his career with it. The purest page-turner on this list. One open evening is all it requires, and all you will get.", "family": ["Charles"], "sources": [], "awards": [], "tags": ["Thriller", "Crime"], "color": "stone"}, {"id": 132, "title": "There Are No Children Here", "author": "Alex Kotlowitz", "sortYear": 1991, "displayDate": "1991", "description": "Two brothers, eleven and nine, grow up in a Chicago housing project where gunfire dictates the walk to school. Kotlowitz spent two years with the family and wrote the most important American book of its decade about urban poverty. Journalism with a novelist's heart. The title comes from their mother: there are no children here, they've seen too much.", "family": ["Mike"], "sources": [], "awards": [], "tags": ["Non-Fiction", "Social Novel", "Race & Identity", "History"], "color": "alpenglow"}, {"id": 134, "title": "The English Patient", "author": "Michael Ondaatje", "sortYear": 1992, "displayDate": "1992", "description": "In a bombed Italian villa at the war's end, a nurse tends a burned man with no name, while his memories assemble a desert love affair and a betrayal of maps. Ondaatje writes prose at the pressure of poetry, and his Booker winner rewards slow reading. Begin with low expectations of plot and high expectations of beauty. Both will be exceeded.", "family": [], "sources": ["Oxford Curated"], "awards": ["Booker Prize (1992)"], "tags": ["Literary Fiction", "War", "Romance"], "color": "sky"}, {"id": 135, "title": "Young Men and Fire", "author": "Norman Maclean", "sortYear": 1992, "displayDate": "1992", "description": "In 1949, fifteen smokejumpers dropped onto a Montana gulch fire, and within two hours twelve were dead. Maclean spent his last years reconstructing exactly what happened on that slope, and why. Published after his death, it is the most rigorous American book about wilderness, catastrophe, and the limits of knowing. Non-fiction with the weight of tragedy.", "family": ["Bobby"], "sources": [], "awards": [], "tags": ["Non-Fiction", "Nature & Wilderness", "History", "Tragedy"], "color": "lantern"}, {"id": 136, "title": "The Artist's Way", "author": "Julia Cameron", "sortYear": 1992, "displayDate": "1992", "description": "Cameron's twelve-week programme for recovering creative confidence, built on two tools: three longhand pages every morning, and a weekly solo expedition she calls the artist date. Three decades of writers, painters, and founders swear by it. Not a book to read but a book to do. The morning pages alone have unblocked half the creative professionals you admire.", "family": ["Allan"], "sources": [], "awards": [], "tags": ["Non-Fiction"], "color": "forest"}, {"id": 137, "title": "A Suitable Boy", "author": "Vikram Seth", "sortYear": 1993, "displayDate": "1993", "description": "Mrs Rupa Mehra is determined to find her daughter Lata a suitable boy, while newly independent India holds its first elections around the search. Fifteen hundred pages, four families, and the most generous family novel of the late twentieth century. The book that proves length is a feature when the company is this good. Commit to it and it repays in months of pleasure.", "family": [], "sources": ["Oxford Curated"], "awards": [], "tags": ["Epic", "Family Saga", "Historical Fiction", "Romance", "India"], "color": "sunset"}, {"id": 139, "title": "Undaunted Courage", "author": "Stephen E. Ambrose", "sortYear": 1996, "displayDate": "1996", "description": "Lewis and Clark cross the continent with a keelboat, a Newfoundland dog, and instructions from Jefferson to find the Northwest Passage that does not exist. Ambrose tells the expedition through Meriwether Lewis, from the president's library to the tragic aftermath. Narrative history at full gallop. The great American adventure, because it actually happened.", "family": ["Amy"], "sources": [], "awards": [], "tags": ["Non-Fiction", "History", "Adventure", "Biography", "Nature & Wilderness"], "color": "stone"}, {"id": 140, "title": "A Game of Thrones", "author": "George R.R. Martin", "sortYear": 1996, "displayDate": "1996", "description": "Noble houses scheme for an iron throne while an ancient cold gathers beyond the wall that everyone has stopped believing in. Martin imported the moral ruthlessness of historical fiction into epic fantasy and broke the genre's rules about who survives. Yes, the show ended badly. The books remain extraordinary, and the books are not finished with you.", "family": ["Amy"], "sources": [], "awards": [], "tags": ["Fantasy", "Epic", "Adventure", "Political Fiction"], "color": "alpenglow"}, {"id": 141, "title": "Into the Wild", "author": "Jon Krakauer", "sortYear": 1996, "displayDate": "1996", "description": "Christopher McCandless gave his savings to charity, burned the cash in his wallet, and walked into the Alaskan bush with a rifle and a bag of rice. Four months later hunters found his body. Krakauer's investigation of why became the defining American non-fiction of its decade. A book that starts arguments about freedom, family, and foolishness. All of them worth having.", "family": ["Bobby"], "sources": [], "awards": [], "tags": ["Non-Fiction", "Nature & Wilderness", "Biography", "Adventure", "Tragedy"], "color": "sky"}, {"id": 142, "title": "The Red Tent", "author": "Anita Diamant", "sortYear": 1997, "displayDate": "1997", "description": "Dinah, given a single violent chapter in Genesis, finally tells her own story from inside the women's tents of the patriarchs, where the real history was kept. Diamant's novel launched an entire genre of feminist biblical retelling and a million book-club conversations. Ancient world, immediate voice. The kind of book that gets passed between sisters.", "family": ["Sue"], "sources": [], "awards": [], "tags": ["Historical Fiction", "Feminist", "Family Saga", "Faith & Spirit"], "color": "lantern"}, {"id": 143, "title": "Harry Potter and the Philosopher's Stone", "author": "J.K. Rowling", "sortYear": 1997, "displayDate": "1997", "description": "An orphan in a cupboard under the stairs learns on his eleventh birthday that he is a wizard, and the largest reading phenomenon of the modern era begins. Whatever else has accumulated around the series, the first book remains a perfectly built children's novel: funny, frightening, and generous. Reading it aloud to a child is one of life's reliable pleasures.", "family": ["Letizia"], "sources": [], "awards": [], "tags": ["Fantasy", "Children & Young Readers", "Adventure", "Coming of Age"], "color": "forest"}, {"id": 144, "title": "American Pastoral", "author": "Philip Roth", "sortYear": 1997, "displayDate": "1997", "description": "Swede Levov, high-school legend, marine, beauty-queen husband, factory owner, the American century in one man, watches his daughter bomb a post office to protest Vietnam. Roth's Pulitzer winner asks how the dream produced the explosion, and refuses every easy answer. The great novel of postwar America's self-image meeting its consequences.", "family": [], "sources": ["Oxford Curated"], "awards": ["Pulitzer Prize (1998)"], "tags": ["Modern Classic", "Literary Fiction", "Family Saga"], "color": "sunset"}, {"id": 145, "title": "Disgrace", "author": "J.M. Coetzee", "sortYear": 1999, "displayDate": "1999", "description": "A Cape Town professor loses his position over an affair with a student and retreats to his daughter's farm, where post-apartheid South Africa presents its own bill. Coetzee's second Booker winner is short, cold, and morally exact to the point of discomfort. Not a likeable book. An essential one. It will start the longest conversation of any title on this list.", "family": [], "sources": ["Guardian Top 100", "Oxford Curated"], "awards": ["Booker Prize (1999)", "Nobel Prize (Coetzee, 2003)"], "tags": ["Modern Classic", "Literary Fiction", "Postcolonial", "Short Read"], "color": "stone"}, {"id": 146, "title": "White Teeth", "author": "Zadie Smith", "sortYear": 2000, "displayDate": "2000", "description": "Two wartime friends, one English and one Bengali, raise families in a North London where every generation rewrites the rules of belonging. Smith was twenty-four when she published it, and English fiction has been responding ever since. Sprawling, funny, and bursting with voice. The novel that announced what multicultural Britain would sound like on the page.", "family": ["Tim"], "sources": ["Oxford Curated"], "awards": ["Whitbread First Novel Award (2000)"], "tags": ["Contemporary", "Literary Fiction", "Family Saga", "Comedy"], "color": "alpenglow"}, {"id": 147, "title": "My Name Is Red", "author": "Orhan Pamuk", "sortYear": 2000, "displayDate": "2000", "description": "A master miniaturist is murdered in 1591 Istanbul, and the suspects, the corpse, a coin, and the colour red all take turns telling the story. Pamuk's most dazzling novel is a murder mystery built inside an argument about art, faith, and seeing. The foundation of his Nobel. For readers who want their detective fiction with philosophical stakes.", "family": [], "sources": ["Oxford Curated"], "awards": ["IMPAC Dublin Award (2003)", "Nobel Prize (Pamuk, 2006)"], "tags": ["Literary Fiction", "Mystery", "Historical Fiction"], "color": "sky"}, {"id": 148, "title": "Kitchen Confidential", "author": "Anthony Bourdain", "sortYear": 2000, "displayDate": "2000", "description": "Bourdain pulled back the curtain on professional kitchens, the heat, the crews, the cocaine, the brotherhood, with the swagger of a line cook who barely survived them. The book that turned a journeyman chef into the most honest voice in food writing. Read it before your next restaurant meal and you will tip differently. Probably more.", "family": ["Nick"], "sources": [], "awards": [], "tags": ["Non-Fiction", "Memoir"], "color": "lantern"}, {"id": 149, "title": "A Trip to the Stars", "author": "Nicholas Christopher", "sortYear": 2000, "displayDate": "2000", "description": "A boy is kidnapped by his great-uncle at a planetarium and raised in a Las Vegas hotel among astronomers, gamblers, and ghosts, while the aunt who lost him searches for fifteen years. Christopher's novel runs on coincidence, starlight, and the architecture of memory. A cult favourite that readers hand each other like a secret. Consider the secret shared.", "family": ["Amy"], "sources": [], "awards": [], "tags": ["Literary Fiction", "Mystery", "Adventure"], "color": "forest"}, {"id": 150, "title": "Nothing Like It in the World", "author": "Stephen Ambrose", "sortYear": 2000, "displayDate": "2000", "description": "The transcontinental railroad, built from both coasts at once by Irish veterans and Chinese labourers through mountains the engineers had been told were impassable. Ambrose tells it as the epic it was, golden spike and all. History as adventure story. For the family member who reads about how big things actually get built.", "family": ["Allan"], "sources": [], "awards": [], "tags": ["Non-Fiction", "History", "Adventure"], "color": "sunset"}, {"id": 151, "title": "Atonement", "author": "Ian McEwan", "sortYear": 2001, "displayDate": "2001", "description": "On a hot 1935 afternoon, thirteen-year-old Briony sees something she does not understand, tells a lie she half believes, and destroys two lives. The rest of the novel is her sixty-year attempt to repair it, including the ending, which readers argue about to this day. McEwan's most layered book: about class, war, and what fiction can and cannot atone for.", "family": ["Tim", "Martha"], "sources": ["NYT 21st Century", "Oxford Curated"], "awards": [], "tags": ["Contemporary", "Literary Fiction", "War", "Romance", "Historical Fiction"], "color": "stone"}, {"id": 152, "title": "Austerlitz", "author": "W.G. Sebald", "sortYear": 2001, "displayDate": "2001", "description": "An architectural historian raised in Wales slowly recovers the truth: he arrived on a Kindertransport at four, and his real history vanished into occupied Prague. Sebald's hybrid of fiction, memoir, and photography is the most original prose project of the new century. Hypnotic, mournful, and unlike anything else on this list. Read it slowly, as it asks.", "family": [], "sources": ["NYT 21st Century", "Oxford Curated"], "awards": [], "tags": ["Literary Fiction", "History", "War", "Memoir"], "color": "alpenglow"}, {"id": 153, "title": "Life of Pi", "author": "Yann Martel", "sortYear": 2001, "displayDate": "2001", "description": "A sixteen-year-old Indian boy survives a shipwreck and 227 days on a Pacific lifeboat with a Bengal tiger named Richard Parker. Or does he? Martel's Booker winner builds to a final choice between two versions of the story, and which one you accept says everything. The book-club novel that actually deserves the book clubs.", "family": [], "sources": [], "awards": ["Booker Prize (2002)"], "tags": ["Contemporary", "Adventure", "Philosophy & Ideas"], "color": "sky"}, {"id": 154, "title": "Middlesex", "author": "Jeffrey Eugenides", "sortYear": 2002, "displayDate": "2002", "description": "Cal Stephanides, born Calliope, traces the recessive gene that shaped a life back through three generations of a Greek American family, from a burning Smyrna to suburban Detroit. Eugenides won the Pulitzer for a genuine modern epic about gender, immigration, and inheritance. Big-hearted, funny, and wise. A family saga in the fullest sense.", "family": [], "sources": ["NYT 21st Century", "Oxford Curated"], "awards": ["Pulitzer Prize (2003)"], "tags": ["Contemporary", "Family Saga", "Epic", "Coming of Age"], "color": "lantern"}, {"id": 155, "title": "The Known World", "author": "Edward P. Jones", "sortYear": 2003, "displayDate": "2003", "description": "Henry Townsend, a Black farmer in pre-Civil War Virginia, owns slaves himself, and his death sets the county's whole moral order trembling. Jones writes with the formal calm of a nineteenth century master and the force of a contemporary one. The Pulitzer winner that broke open new ground in writing about American slavery. Quietly magisterial.", "family": [], "sources": ["NYT 21st Century", "Oxford Curated"], "awards": ["Pulitzer Prize (2004)"], "tags": ["Literary Fiction", "Historical Fiction", "Race & Identity"], "color": "forest"}, {"id": 156, "title": "Shantaram", "author": "Gregory David Roberts", "sortYear": 2003, "displayDate": "2003", "description": "An escaped Australian convict lands in 1980s Bombay and descends through its slums, its mafia, and its philosophy, narrated with a swagger that readers either adore or refuse. A thousand pages of autobiography-as-novel, disputed in its facts and undeniable in its momentum. The ultimate backpacker epic. Pack it for any long journey east.", "family": ["Charles"], "sources": [], "awards": [], "tags": ["Adventure", "Epic", "Crime", "India"], "color": "sunset"}, {"id": 157, "title": "The Devil in the White City", "author": "Erik Larson", "sortYear": 2003, "displayDate": "2003", "description": "Chicago, 1893: the architect Daniel Burnham races to build the World's Fair while H.H. Holmes builds a hotel designed for murder a few blocks away. Larson braids the two stories into the book that defined modern narrative non-fiction. History that reads like a thriller because, occasionally, it was one. The family's gateway drug to non-fiction.", "family": ["Charles"], "sources": [], "awards": [], "tags": ["Non-Fiction", "History", "Crime", "Thriller"], "color": "stone"}, {"id": 158, "title": "Still Life", "author": "Louise Penny", "sortYear": 2005, "displayDate": "2005", "description": "A beloved retired teacher is found dead in the woods outside Three Pines, a Quebec village too charming for murder, and Chief Inspector Armand Gamache arrives asking gentle, devastating questions. Penny's debut opened one of the most loved mystery series of the century. Begin here, and accept that the remaining eighteen books will follow. They always do.", "family": ["Martha"], "sources": [], "awards": [], "tags": ["Mystery", "Crime", "Contemporary"], "color": "alpenglow"}, {"id": 159, "title": "Half of a Yellow Sun", "author": "Chimamanda Ngozi Adichie", "sortYear": 2006, "displayDate": "2006", "description": "Twin sisters, a houseboy, and an English writer are pulled apart by the Biafran war, told with the realist confidence of the nineteenth century novels Adichie grew up loving. The most important African novel of the new century and a masterclass in how fiction carries history. Devastating and humane in equal measure.", "family": [], "sources": ["Guardian Top 100", "Oxford Curated"], "awards": ["Orange Prize for Fiction (2007)"], "tags": ["Contemporary", "Historical Fiction", "War", "Postcolonial"], "color": "sky"}, {"id": 160, "title": "Water for Elephants", "author": "Sara Gruen", "sortYear": 2006, "displayDate": "2006", "description": "A Depression-era veterinary student jumps a train that turns out to belong to a second-rate circus, and falls for the star performer married to its violent ringmaster. Gruen's beloved novel runs on sawdust, spectacle, and an elephant named Rosie. Pure story, expertly told. The definition of a satisfying read.", "family": ["Charles"], "sources": [], "awards": [], "tags": ["Historical Fiction", "Romance", "Adventure"], "color": "lantern"}, {"id": 161, "title": "Washington's Spies", "author": "Alexander Rose", "sortYear": 2006, "displayDate": "2006", "description": "The Culper Ring: farmers, merchants, and a Long Island housewife who ran intelligence for Washington under the noses of the British army. Rose reconstructs the network from its surviving letters, invisible ink and all. The true story behind the series Turn, and better than the series. Revolutionary history at ground level, where it was actually won.", "family": ["Amy"], "sources": [], "awards": [], "tags": ["Non-Fiction", "History"], "color": "forest"}, {"id": 162, "title": "The Brief Wondrous Life of Oscar Wao", "author": "Junot Díaz", "sortYear": 2007, "displayDate": "2007", "description": "Oscar, an overweight Dominican American nerd in New Jersey, dreams of love and fantasy novels while the family curse, the fukú, works backward through Trujillo's dictatorship. Díaz invented a new American voice, Spanglish and footnotes and fury, and won the Pulitzer with it. Funny and shattering, frequently in the same sentence.", "family": [], "sources": ["NYT 21st Century", "Oxford Curated"], "awards": ["Pulitzer Prize (2008)"], "tags": ["Contemporary", "Literary Fiction", "Race & Identity", "Family Saga", "Latin America"], "color": "sunset"}, {"id": 163, "title": "The Vegetarian", "author": "Han Kang", "sortYear": 2007, "displayDate": "2007", "description": "A Korean woman stops eating meat after a dream, and her family's response escalates from embarrassment to violence while she drifts toward becoming something other than human. Short, strange, and profoundly unsettling, the novel that introduced Han to the world before her Nobel. A book you finish in two sittings and carry for much longer.", "family": [], "sources": ["NYT 21st Century", "Guardian Top 100", "Oxford Curated"], "awards": ["International Booker (2016)", "Nobel Prize (Han, 2024)"], "tags": ["Contemporary", "Literary Fiction", "Short Read"], "color": "stone"}, {"id": 164, "title": "City of Thieves", "author": "David Benioff", "sortYear": 2008, "displayDate": "2008", "description": "In besieged Leningrad, two young men, a thief and a deserter, are spared execution on one condition: find a dozen eggs for a colonel's daughter's wedding cake in a starving city. Benioff's novel is funny, harrowing, and somehow both at once, page by page. One of the great war stories of the century. Hand it to any reader between fifteen and ninety.", "family": ["Nick"], "sources": [], "awards": [], "tags": ["Historical Fiction", "War", "Adventure", "Coming of Age"], "color": "alpenglow"}, {"id": 165, "title": "Wolf Hall", "author": "Hilary Mantel", "sortYear": 2009, "displayDate": "2009", "description": "Thomas Cromwell, blacksmith's son, rises through Henry VIII's court on intelligence alone, rendered from inside his head in a present tense that makes the Tudor world feel like breaking news. Mantel's Booker winner redefined the historical novel. Once the rhythm clicks, usually around page forty, you are hers for the trilogy.", "family": [], "sources": ["NYT 21st Century", "Oxford Curated"], "awards": ["Booker Prize (2009)"], "tags": ["Historical Fiction", "Literary Fiction", "Political Fiction"], "color": "sky"}, {"id": 166, "title": "Unbroken", "author": "Laura Hillenbrand", "sortYear": 2010, "displayDate": "2010", "description": "Louis Zamperini ran in the Berlin Olympics, crashed into the Pacific, survived forty-seven days on a raft, and then the Japanese POW camps began. Hillenbrand spent seven years researching a story that would be rejected as implausible fiction. The most gripping survival narrative in modern non-fiction. Resilience, defined at book length.", "family": ["Lenora"], "sources": [], "awards": [], "tags": ["Non-Fiction", "Biography", "War", "History", "Adventure"], "color": "lantern"}, {"id": 167, "title": "A Visit from the Goon Squad", "author": "Jennifer Egan", "sortYear": 2010, "displayDate": "2010", "description": "A record executive, his kleptomaniac assistant, and everyone orbiting them, tracked across five decades of the music business, including one chapter told entirely in PowerPoint that should not work and absolutely does. Egan won the Pulitzer for turning formal play into a meditation on time. Time's a goon, right? The book proves it gently.", "family": [], "sources": ["NYT 21st Century", "Oxford Curated"], "awards": ["Pulitzer Prize (2011)"], "tags": ["Contemporary", "Literary Fiction", "Arts & Music"], "color": "forest"}, {"id": 168, "title": "My Brilliant Friend", "author": "Elena Ferrante", "sortYear": 2011, "displayDate": "2011", "description": "Elena and Lila grow up fierce and entangled in a poor Naples neighbourhood, their friendship the one constant in lives that keep diverging. The first of the Neapolitan novels, the largest realist project of the century, written by an author whose identity remains a genuine mystery. Begin it and you will read all four. The family can confirm.", "family": [], "sources": ["NYT 21st Century", "Guardian Top 100", "Oxford Curated"], "awards": [], "tags": ["Contemporary", "Literary Fiction", "Coming of Age", "Family Saga"], "color": "sunset"}, {"id": 169, "title": "Gone Girl", "author": "Gillian Flynn", "sortYear": 2012, "displayDate": "2012", "description": "Amy Dunne vanishes on her fifth wedding anniversary, every clue points to her husband, and then the novel executes the most discussed twist of its decade. Flynn reinvented the domestic thriller and launched a thousand imitators with unreliable narrators and Girl in the title. None of them are this sharp. The marriage thriller, definitively.", "family": ["Mary Kate"], "sources": [], "awards": [], "tags": ["Thriller", "Crime", "Mystery", "Contemporary"], "color": "stone"}, {"id": 170, "title": "The Goldfinch", "author": "Donna Tartt", "sortYear": 2013, "displayDate": "2013", "description": "A bomb at the Met kills Theo Decker's mother and leaves him holding a small Dutch painting that will shape, and warp, the next twenty years of his life. Tartt spent eleven years writing it and won the Pulitzer. Dickensian in scale and devotion, with the best Las Vegas chapters in American fiction. A novel to live inside for a month.", "family": ["Tim"], "sources": ["NYT 21st Century", "Oxford Curated"], "awards": ["Pulitzer Prize (2014)"], "tags": ["Contemporary", "Literary Fiction", "Coming of Age", "Epic"], "color": "alpenglow"}, {"id": 171, "title": "The Emerald Mile", "author": "Kevin Fedarko", "sortYear": 2013, "displayDate": "2013", "description": "During the 1983 flood, with the Grand Canyon dam engineers fighting catastrophe, three river guides launched a wooden dory in secret to run the fastest descent of the Colorado ever attempted. Fedarko braids the speed run, the dam crisis, and the river's deep history into the definitive Grand Canyon book. Adventure non-fiction at its absolute best.", "family": ["Bobby"], "sources": [], "awards": [], "tags": ["Non-Fiction", "Adventure", "Nature & Wilderness", "History"], "color": "sky"}, {"id": 172, "title": "Annihilation", "author": "Jeff VanderMeer", "sortYear": 2014, "displayDate": "2014", "description": "Four women, known only by their professions, cross the border into Area X, a quarantined zone where nature has become something lush, wrong, and patient. Eleven expeditions preceded them; none ended well. VanderMeer's Southern Reach trilogy begins here, and nothing in the New Weird is stranger or more controlled. Ecological horror with the logic of a dream.", "family": ["Mary Kate"], "sources": [], "awards": [], "tags": ["Science Fiction", "Horror", "Nature & Wilderness", "Short Read"], "color": "lantern"}, {"id": 173, "title": "All the Light We Cannot See", "author": "Anthony Doerr", "sortYear": 2014, "displayDate": "2014", "description": "A blind French girl carrying a cursed diamond and a German boy who hears the war through his radio converge on occupied Saint-Malo in the final days before liberation. Doerr's Pulitzer winner is built from chapters short as held breaths. Luminous is the overused word, and here it is simply accurate. The rare literary novel everyone in a family can love.", "family": [], "sources": ["Oxford Curated"], "awards": ["Pulitzer Prize (2015)"], "tags": ["Historical Fiction", "War", "Literary Fiction"], "color": "forest"}, {"id": 174, "title": "Outline", "author": "Rachel Cusk", "sortYear": 2014, "displayDate": "2014", "description": "A writer flies to Athens to teach a summer course and mostly listens, while the people she meets pour out their marriages, vanities, and griefs, her own life visible only in outline. Cusk built a new kind of novel from pure attention, and half of contemporary fiction has been imitating it since. Cool, exact, and quietly addictive.", "family": ["Tom"], "sources": ["NYT 21st Century", "Oxford Curated"], "awards": [], "tags": ["Contemporary", "Literary Fiction", "Short Read"], "color": "sunset"}, {"id": 175, "title": "Red Rising", "author": "Pierce Brown", "sortYear": 2014, "displayDate": "2014", "description": "Darrow mines helium beneath the surface of Mars believing his caste's sacrifice is building humanity's future, until he learns the surface was terraformed generations ago and his people were never meant to rise. Brown's debut ignited the most successful science fiction series of its decade. Relentless momentum. The one that converts non-readers, reliably.", "family": ["Nick"], "sources": [], "awards": [], "tags": ["Science Fiction", "Dystopia", "Adventure", "Coming of Age"], "color": "stone"}, {"id": 176, "title": "The Sympathizer", "author": "Viet Thanh Nguyen", "sortYear": 2015, "displayDate": "2015", "description": "A communist double agent evacuates Saigon with the South Vietnamese general he is spying on, and continues filing reports from Los Angeles. Nguyen's Pulitzer-winning debut rewrote the American Vietnam novel from the other side, in a confession that is also a dark comedy. The opening line alone, I am a spy, a sleeper, a spook, announces a major writer.", "family": [], "sources": ["NYT 21st Century", "Oxford Curated"], "awards": ["Pulitzer Prize (2016)"], "tags": ["Contemporary", "Literary Fiction", "War", "Race & Identity"], "color": "alpenglow"}, {"id": 177, "title": "The Marriage of Opposites", "author": "Alice Hoffman", "sortYear": 2015, "displayDate": "2015", "description": "On colonial St Thomas, a headstrong young woman in the island's small Jewish community scandalises everyone by marrying her late husband's nephew, and their son grows up to be Camille Pissarro. Hoffman paints the Caribbean light the Impressionists would chase. Lush historical fiction with a genuine painter's palette. For readers who love art and islands both.", "family": ["Sue"], "sources": [], "awards": [], "tags": ["Historical Fiction", "Romance", "Family Saga", "Arts & Music"], "color": "sky"}, {"id": 178, "title": "When the Moon Is Low", "author": "Nadia Hashimi", "sortYear": 2015, "displayDate": "2015", "description": "After the Taliban executes her husband, an Afghan widow walks her three children across Iran, Turkey, and the Balkans toward asylum in England, while her teenage son is separated en route. Hashimi puts faces and names on the migration crisis the headlines reduce to numbers. Urgent, humane, and impossible to read from a distance.", "family": ["Sue"], "sources": [], "awards": [], "tags": ["Contemporary", "Family Saga", "Social Novel"], "color": "lantern"}, {"id": 179, "title": "The Mountain Shadow", "author": "Gregory David Roberts", "sortYear": 2015, "displayDate": "2015", "description": "Lin returns to a Bombay changed for the worse: his mentor dead, the brotherhood splintering, the philosophy darker. The long-awaited sequel to Shantaram divides its readers exactly as the original did, and is devoured exactly as fast. For those who finished Shantaram and immediately wanted more city, more chaos, more Lin. Here it is.", "family": ["Anne-Worley"], "sources": [], "awards": [], "tags": ["Adventure", "Crime", "Epic", "India"], "color": "forest"}, {"id": 180, "title": "The Underground Railroad", "author": "Colson Whitehead", "sortYear": 2016, "displayDate": "2016", "description": "Cora flees a Georgia plantation on an Underground Railroad that Whitehead makes literal: real tunnels, real locomotives, each state a different chapter of American cruelty. The conceit sounds like a gimmick and reads like a masterstroke. Pulitzer, National Book Award, and the rare hype that understates the book. Harrowing and necessary.", "family": [], "sources": ["NYT 21st Century", "Oxford Curated"], "awards": ["Pulitzer Prize (2017)", "National Book Award (2016)"], "tags": ["Historical Fiction", "Race & Identity", "Literary Fiction", "Magical Realism"], "color": "sunset"}, {"id": 181, "title": "Exit West", "author": "Mohsin Hamid", "sortYear": 2017, "displayDate": "2017", "description": "Saeed and Nadia fall in love as their unnamed city slides into war, then escape through black doors that open onto Mykonos, London, Marin. Hamid found one small magical device that let him write the global migration story whole. Tender, spare, and wise about how leaving changes love. A short novel that covers the entire world.", "family": [], "sources": ["NYT 21st Century", "Oxford Curated"], "awards": [], "tags": ["Contemporary", "Literary Fiction", "Magical Realism", "Romance", "Short Read"], "color": "stone"}, {"id": 182, "title": "Pachinko", "author": "Min Jin Lee", "sortYear": 2017, "displayDate": "2017", "description": "Sunja, a fisherman's daughter in occupied Korea, follows a single mistake into four generations of exile in Japan, where her family builds lives in a country that will not claim them. Lee writes in the grand realist tradition, and the result is the most quietly powerful family saga of the decade. History is unfair, the famous first line begins. The novel shows exactly how.", "family": [], "sources": ["NYT 21st Century", "Oxford Curated"], "awards": [], "tags": ["Contemporary", "Family Saga", "Historical Fiction", "Epic"], "color": "alpenglow"}, {"id": 183, "title": "Say Nothing", "author": "Patrick Radden Keefe", "sortYear": 2018, "displayDate": "2018", "description": "In 1972, masked intruders took Jean McConville, a widowed mother of ten, from her Belfast flat, and no one said anything for thirty years. Keefe unspools her disappearance into a complete reckoning with the Troubles, the IRA, and the price of silence. The most acclaimed non-fiction of its decade, and it earns every word. True crime elevated to history.", "family": ["Nick"], "sources": [], "awards": [], "tags": ["Non-Fiction", "History", "Crime"], "color": "sky"}, {"id": 184, "title": "The Overstory", "author": "Richard Powers", "sortYear": 2018, "displayDate": "2018", "description": "Nine strangers, an activist, a scientist, a coder, a veteran, are drawn together by trees: what they know, what they communicate, what we are doing to them. Powers won the Pulitzer for the climate novel st Century", "Oxford Curated"], "awards": ["Booker Prize shortlist (2022)"], "tags": ["Contemporary", "Literary Fiction", "Historical Fiction", "Short Read"], "color": "lantern"}, {"id": 192, "title": "Project Hail Mary", "author": "Andy Weir", "sortYear": 2021, "displayDate": "2021", "description": "Ryland Grace wakes alone on a spaceship with amnesia, two dead crewmates, and, it slowly emerges, the job of saving Earth from an organism eating the sun. Then he meets someone. Weir's best novel is funnier and far more moving than The Martian, and the friendship at its core is the science fiction surprise of the decade. Pure joy, with math.", "family": ["Mary Kate"], "sources": [], "awards": [], "tags": ["Science Fiction", "Adventure", "Comedy"], "color": "forest"}, {"id": 193, "title": "Babel", "author": "R.F. Kuang", "sortYear": 2022, "displayDate": "2022", "description": "Robin Swift, orphaned in Canton, is raised to serve Oxford's Royal Institute of Translation, where the empire's magic is forged from the meanings lost between languages, until he understands exactly what the silver costs and who pays. Kuang's dark academic fantasy is also a serious argument about translation and power. The literary fantasy event of its year.", "family": ["Nick"], "sources": [], "awards": [], "tags": ["Fantasy", "Historical Fiction", "Postcolonial"], "color": "sunset"}, {"id": 194, "title": "Lessons in Chemistry", "author": "Bonnie Garmus", "sortYear": 2022, "displayDate": "2022", "description": "Elizabeth Zott, a brilliant chemist forced out of her lab by 1960s sexism, becomes the unlikely star of a cooking show and uses it to teach housewives chemistry, and rather more. Garmus's debut became a global phenomenon on pure charm and justified anger. Funny, satisfying, and sneakily sharp about how institutions waste women. The book everyone's book club already loves.", "family": ["Martha"], "sources": [], "awards": [], "tags": ["Contemporary", "Comedy", "Feminist", "Historical Fiction"], "color": "stone"}, {"id": 195, "title": "Demon Copperhead", "author": "Barbara Kingsolver", "sortYear": 2022, "displayDate": "2022", "description": "David Copperfield reborn in opioid-era Appalachia: a boy with red hair and no luck narrates his way through foster care, football, addiction, and the institutions that fail him at every turn. Kingsolver's Pulitzer winner is the most devastating American social novel since Steinbeck, with the most irresistible voice of its decade. Dickens would recognise every page, and approve.", "family": ["Tim"], "sources": ["NYT 21st Century", "Oxford Curated"], "awards": ["Pulitzer Prize (2023)", "Women's Prize for Fiction (2023)"], "tags": ["Contemporary", "Coming of Age", "Social Novel", "American South"], "color": "alpenglow"}, {"id": 196, "title": "Trust", "author": "Hernan Díaz", "sortYear": 2022, "displayDate": "2022", "description": "A Wall Street tycoon's fortune and marriage, told four times: a novel, a memoir, a ghostwriter's account, and finally the diary that undoes the rest. Díaz won the Pulitzer for a book about how money buys the power to write its own history. An elegant puzzle box with a sting. Readers finish it and immediately want to reread the first section. By design.", "family": [], "sources": ["NYT 21st Century", "Oxford Curated"], "awards": ["Pulitzer Prize (2023)"], "tags": ["Contemporary", "Literary Fiction", "Historical Fiction", "Mystery"], "color": "sky"}, {"id": 197, "title": "Prophet Song", "author": "Paul Lynch", "sortYear": 2023, "displayDate": "2023", "description": "Dublin, the near future: a microbiologist's husband is taken by the new secret police, and Eilish Stack keeps believing normal life can be preserved until the moment it cannot. Lynch's Booker winner is the most claustrophobic political novel of the decade, written in prose that refuses paragraph breaks the way the state refuses exits. It could happen anywhere is the point.", "family": ["Nick"], "sources": [], "awards": ["Booker Prize (2023)"], "tags": ["Contemporary", "Dystopia", "Political Fiction", "Literary Fiction"], "color": "lantern"}, {"id": 198, "title": "The Heaven and Earth Grocery Store", "author": "James McBride", "sortYear": 2023, "displayDate": "2023", "description": "A skeleton turns up in a well in Pottstown, Pennsylvania, and the story spirals back to Chicken Hill in the 1930s, where Black and Jewish neighbours conspired to protect a deaf boy the state wanted to institutionalise. McBride's National Book Award winner is community as comedy, conspiracy, and grace. The warmest serious novel of its decade.", "family": ["Martha"], "sources": [], "awards": ["National Book Award (2023)"], "tags": ["Contemporary", "Historical Fiction", "Race & Identity", "Comedy"], "color": "forest"}, {"id": 199, "title": "Orbital", "author": "Samantha Harvey", "sortYear": 2024, "displayDate": "2024", "description": "Six astronauts circle the Earth sixteen times in a single day, watching typhoons form, continents scroll past, and their own lives shrink and sharpen against the black. Harvey's Booker winner is barely a novel and entirely a marvel: the overview effect rendered in prose. The shortest book on this list, and among the most beautiful. Read it in one orbit.", "family": [], "sources": [], "awards": ["Booker Prize (2024)"], "tags": ["Contemporary", "Literary Fiction", "Science Fiction", "Short Read"], "color": "sunset"}, {"id": 200, "title": "James", "author": "Percival Everett", "sortYear": 2024, "displayDate": "2024", "description": "Huckleberry Finn retold by Jim, who can read, write, and think rings around every white character he must perform ignorance for, and whose run for freedom is no boyhood adventure. Everett's Pulitzer winner answers Twain across a century and a half, with fury and brilliant comedy in equal parts. An instant American classic. Read it beside the original and feel the ground shift.", "family": [], "sources": [], "awards": ["Pulitzer Prize (2025)"], "tags": ["Contemporary", "Historical Fiction", "Race & Identity", "Satire"], "color": "stone"}, {"id": 201, "title": "Intermezzo", "author": "Sally Rooney", "sortYear": 2024, "displayDate": "2024", "description": "Two brothers, a chess prodigy adrift and a Dublin lawyer in crisis, grieve their father in opposite directions while complicating every relationship they touch. Rooney's most mature novel slows her famous dialogue into something deeper and more forgiving. Her best book, by the assessment of readers who were sceptical of the phenomenon. Come for the discourse, stay for the chess.", "family": ["Nick"], "sources": [], "awards": [], "tags": ["Contemporary", "Literary Fiction", "Family Saga", "Romance"], "color": "alpenglow"}];

const slug = (n) => n.replace(/\s+/g, "_");
const centuryOf = (y) => (y < 1900 ? "The Nineteenth Century" : y < 2000 ? "The Twentieth Century" : "The Twenty-First Century");

/* ---------- Firestore wiring ----------
   The family id comes from ?family= in the URL, falling back to "default".
   Auth is anonymous; sign-in happens once at mount and the listeners attach after. */
function familyIdFromUrl() {
  const raw = new URLSearchParams(window.location.search).get("family") || "default";
  return raw.replace(/[^a-zA-Z0-9_-]/g, "").slice(0, 60) || "default";
}
const slugMember = (n) => n.replace(/[^a-zA-Z0-9]+/g, "_");

function familyDoc(familyId) { return firebase.firestore().collection("families").doc(familyId); }
function marksColl(familyId) { return familyDoc(familyId).collection("marks"); }

async function writeMain(familyId, patch) {
  await familyDoc(familyId).set(patch, { merge: true });
}
async function writeMarks(familyId, name, marks) {
  await marksColl(familyId).doc(slugMember(name)).set(marks, { merge: true });
}

/* ---------- cover ---------- */
function Cover({ book, size }) {
  const color = PALETTE[book.color];
  const tl = book.title.length;
  const titleClass = tl > 30 ? "x-long" : tl > 18 ? "long" : "";
  return (
    <div className={"cv " + (size === "full" ? "cv-full" : "cv-thumb")}>
      <div className="cv-top" style={{ background: color }}>
        <div className="cv-masthead">The Trail</div>
        {size === "full" && <div className="cv-payoff">A family's reading journey</div>}
      </div>
      <div className="cv-middle">
        <div className={"cv-title " + titleClass}>{book.title}</div>
        <div className="cv-author">{book.author}</div>
        <div className="cv-date">{book.displayDate}</div>
      </div>
      <div className="cv-bottom" style={{ background: color }}>
        <img src={MARK} alt="" className="cv-mark" />
      </div>
    </div>
  );
}

/* ---------- switch ---------- */
function ReadSwitch({ on, color, onToggle }) {
  return (
    <button className={"sw " + (on ? "sw-on" : "")} style={on ? { background: color } : null} onClick={onToggle} aria-label={on ? "Read" : "To read"}>
      <span className="sw-knob" />
      <span className="sw-label">{on ? "Read" : "To read"}</span>
    </button>
  );
}

function Star({ on, onToggle, big }) {
  return (
    <button className={"star " + (on ? "star-on" : "") + (big ? " star-big" : "")} onClick={onToggle} title="Recommend it to the family">
      {on ? "\u2605" : "\u2606"}
    </button>
  );
}

/* ---------- main app ---------- */
function TheTrail() {
  const [me, setMe] = useState(null);
  const [marks, setMarks] = useState({});
  const [added, setAdded] = useState([]);
  const [extras, setExtras] = useState([]);
  const [loaded, setLoaded] = useState(false);
  const [shelfMode, setShelfMode] = useState("all");
  const [showMenu, setShowMenu] = useState(false);
  const [introOpen, setIntroOpen] = useState(false);
  const [detailId, setDetailId] = useState(null);
  const [showFilter, setShowFilter] = useState(false);
  const [showProfile, setShowProfile] = useState(false);
  const [showAdd, setShowAdd] = useState(false);
  const [filters, setFilters] = useState({ fam: [], awards: [], tags: [] });

  const allNames = useMemo(() => {
    const base = MEMBERS.map((m) => m.name);
    const all = base.concat(extras.filter((e) => !base.includes(e.name)).map((e) => e.name));
    return all.sort((a, b) => a.localeCompare(b));
  }, [extras]);

  const colorOf = useCallback((name) => {
    const m = MEMBERS.find((x) => x.name === name);
    if (m) return PALETTE[m.color];
    const e = extras.find((x) => x.name === name);
    if (e) return PALETTE[e.color];
    return PALETTE.stone;
  }, [extras]);

  const allBooks = useMemo(() => {
    const list = BOOKS.concat(added);
    list.sort((a, b) => a.sortYear - b.sortYear || (a.seq || 0) - (b.seq || 0));
    return list;
  }, [added]);

  /* ---- Firebase auth + Firestore listeners ---- */
  const familyId = useMemo(() => familyIdFromUrl(), []);
  const [authReady, setAuthReady] = useState(false);
  const [authError, setAuthError] = useState(null);

  useEffect(() => {
    if (!firebase.apps.length) {
      try { firebase.initializeApp(window.FIREBASE_CONFIG); }
      catch (e) { setAuthError(e.message); return; }
    }
    firebase.auth().signInAnonymously().catch((e) => setAuthError(e.message));
    const off = firebase.auth().onAuthStateChanged((u) => { if (u) setAuthReady(true); });
    return () => off();
  }, []);

  useEffect(() => {
    const saved = window.localStorage.getItem("trail-me");
    if (saved) setMe(saved);
  }, []);

  useEffect(() => {
    if (!authReady) return;
    const main = familyDoc(familyId).onSnapshot((doc) => {
      const data = doc.exists ? doc.data() : {};
      setExtras(data.extras || []);
      setAdded(data.added || []);
      setLoaded(true);
    }, (err) => { setAuthError(err.message); setLoaded(true); });
    const marksOff = marksColl(familyId).onSnapshot((snap) => {
      const m = {};
      snap.forEach((d) => { m[d.id.replace(/_/g, " ")] = d.data(); });
      setMarks(m);
    }, (err) => { setAuthError(err.message); });
    const t = setTimeout(() => {
      setMe((cur) => {
        if (!cur) setShowProfile(true);
        return cur;
      });
    }, 800);
    return () => { main(); marksOff(); clearTimeout(t); };
  }, [authReady, familyId]);

  /* ---- state reads ---- */
  const isRead = useCallback((name, id) => !!(marks[name] && marks[name].read && marks[name].read[id]), [marks]);
  const isStarred = useCallback((name, book) => {
    const ov = marks[name] && marks[name].star ? marks[name].star[book.id] : undefined;
    if (ov !== undefined) return ov;
    return book.family.includes(name);
  }, [marks]);
  const starredBy = useCallback((book) => allNames.filter((n) => isStarred(n, book)), [allNames, isStarred]);

  /* ---- state writes, one state per person per book ---- */
  const writeMyMarks = useCallback(async (next) => {
    setMarks((m) => ({ ...m, [me]: next }));
    try { await writeMarks(familyId, me, next); }
    catch (e) { console.error("write marks failed", e); }
  }, [me, familyId]);

  const toggleRead = useCallback((book) => {
    if (!me) { setShowProfile(true); return; }
    const mine = marks[me] || { read: {}, star: {} };
    const next = { read: { ...mine.read }, star: { ...mine.star } };
    if (next.read[book.id]) delete next.read[book.id]; else next.read[book.id] = true;
    writeMyMarks(next);
  }, [me, marks, writeMyMarks]);

  const toggleStar = useCallback((book) => {
    if (!me) { setShowProfile(true); return; }
    const mine = marks[me] || { read: {}, star: {} };
    const seeded = book.family.includes(me);
    const current = mine.star && mine.star[book.id] !== undefined ? mine.star[book.id] : seeded;
    const next = { read: { ...mine.read }, star: { ...mine.star } };
    const target = !current;
    if (target === seeded) delete next.star[book.id]; else next.star[book.id] = target;
    writeMyMarks(next);
  }, [me, marks, writeMyMarks]);

  /* ---- profile ---- */
  const chooseProfile = useCallback(async (name) => {
    const trimmed = name.trim();
    if (!trimmed) return;
    const canonical = allNames.find((n) => n.toLowerCase() === trimmed.toLowerCase()) || trimmed;
    if (!allNames.find((n) => n.toLowerCase() === canonical.toLowerCase())) {
      const used = MEMBERS.map((m) => m.color).concat(extras.map((e) => e.color));
      const counts = ROTATION.map((c) => used.filter((u) => u === c).length);
      const color = ROTATION[counts.indexOf(Math.min(...counts))];
      const ex = extras.concat([{ name: canonical, color }]);
      setExtras(ex);
      try { await writeMain(familyId, { extras: ex }); }
      catch (e) { console.error("write profiles failed", e); }
    }
    setMe(canonical);
    window.localStorage.setItem("trail-me", canonical);
    setShowProfile(false);
  }, [allNames, extras, familyId]);

  /* ---- filtering ---- */
  const passes = useCallback((book) => {
    if (filters.fam.length) {
      const stars = starredBy(book);
      const ok = filters.fam.some((f) => f === "ANYONE" ? stars.length > 0 : f === "NOONE" ? stars.length === 0 : stars.includes(f));
      if (!ok) return false;
    }
    if (filters.awards.length) {
      const ok = filters.awards.some((label) => {
        const af = AWARD_FILTERS.find((a) => a.label === label);
        return book.awards.some((aw) => af.match.some((mm) => aw.includes(mm)));
      });
      if (!ok) return false;
    }
    if (filters.tags.length) {
      if (!filters.tags.some((t) => book.tags.includes(t))) return false;
    }
    return true;
  }, [filters, starredBy]);


  const filterCount = filters.fam.length + filters.awards.length + filters.tags.length;

  /* ---- suggestions, computed from current stars ---- */
  const suggestions = useMemo(() => {
    if (!me) return [];
    const df = {};
    allBooks.forEach((b) => b.tags.forEach((t) => { df[t] = (df[t] || 0) + 1; }));
    const N = allBooks.length;
    const idf = {}; Object.keys(df).forEach((t) => { idf[t] = Math.log(N / df[t]); });
    const mine = allBooks.filter((b) => isStarred(me, b));
    if (!mine.length) return [];
    const prof = {};
    mine.forEach((b) => b.tags.forEach((t) => { prof[t] = (prof[t] || 0) + idf[t]; }));
    return allBooks
      .filter((b) => !isStarred(me, b))
      .map((b) => ({ b, s: b.tags.reduce((acc, t) => acc + (prof[t] || 0) * idf[t], 0) }))
      .sort((x, y) => y.s - x.s)
      .slice(0, 10)
      .map((x) => x.b);
  }, [me, allBooks, isStarred]);

  const modeList = useMemo(() => {
    if (!me || shelfMode === "all" || shelfMode === "mine") return allBooks;
    if (shelfMode === "read") return allBooks.filter((b) => isRead(me, b.id));
    if (shelfMode === "toread") return allBooks.filter((b) => !isRead(me, b.id));
    if (shelfMode === "starred") return allBooks.filter((b) => isStarred(me, b));
    if (shelfMode === "suggested") return suggestions;
    return allBooks;
  }, [me, shelfMode, allBooks, isRead, isStarred, suggestions]);
  const filtered = useMemo(() => modeList.filter(passes), [modeList, passes]);

  /* ---- personal counts ---- */
  const myRead = useMemo(() => (me ? allBooks.filter((b) => isRead(me, b.id)).length : 0), [me, allBooks, isRead]);
  const myStarred = useMemo(() => (me ? allBooks.filter((b) => isStarred(me, b)).length : 0), [me, allBooks, isStarred]);

  /* ---- shelf sections ---- */
  const sections = useMemo(() => {
    const out = [];
    let cur = null;
    filtered.forEach((b) => {
      const c = centuryOf(b.sortYear);
      if (!cur || cur.label !== c) { cur = { label: c, books: [] }; out.push(cur); }
      cur.books.push(b);
    });
    return out;
  }, [filtered]);

  const detail = detailId ? allBooks.find((b) => b.id === detailId) : null;
  const myColor = me ? colorOf(me) : PALETTE.stone;

  if (!firebase.apps.length && (!window.FIREBASE_CONFIG || !window.FIREBASE_CONFIG.apiKey)) {
    return <SetupScreen />;
  }
  if (authError) {
    return <ErrorScreen message={authError} familyId={familyId} />;
  }

  return (
    <div className="app">
      <style>{`@import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Hanken+Grotesk:wght@400;600;700&display=swap');
.app { --ink:#1F1A14; --ink-deep:#2B2620; --paper:#F6F0E4; --muted:#6b6358; --rule:#D8D0BD;
  background: var(--paper); min-height: 100vh; color: var(--ink);
  font-family: 'Hanken Grotesk', sans-serif; padding-bottom: 110px; }
.app * { box-sizing: border-box; }
.app button { font-family: inherit; cursor: pointer; color: var(--ink); }

  border-bottom:1px solid var(--ink); background:var(--paper); position:sticky; top:0; z-index:30; }
.mast-home { display:flex; align-items:center; gap:12px; background:none; border:none; padding:0;

                  the Guardian, the New York Times, the great-books curricula of Oxford, Cambridge, Yale, Columbia
                  and St John's, and the major literary prizes, the Booker, the Nobel, the Pulitzer. Then the
                  family went to work.
                </p>
                {introOpen && (
                  <div className="intro-more">
                    <p>
                      Each member chose the books they love. The ones lent and never returned, read aloud on
                      holidays, kept on the shelf for a second or third pass. Those picks are inviolable. A book
                      recommended by someone in the family belongs on The Trail because it helped form who they
                      are, and who we are as a family.
                    </p>
                    <p>
                      A few house rules hold it together. One title per author, relaxed only when a family member
                      insists on a second. Every entry carries its sources, canonical and personal, so you always
                      know who vouches for a book. Every description is written in the house voice: three or four
                      lines, evaluative but not academic, warm but never effusive.
                    </p>
                    <p>
                      The Trail runs in order of publication, from Austen in 1813 to the present, and it is still
                      growing. Anyone in the family can bring a book; it joins the list with their name beside it.
                      Pick a title. Start walking.
                    </p>
                  </div>
                )}
                <button className="intro-toggle" onClick={() => setIntroOpen((o) => !o)}>{introOpen ? "Read less" : "Read more"}</button>
                <div className="intro-how">How it works</div>
                <div className="intro-steps">
                  <div className="intro-step"><span className="istep-n" style={{ background: PALETTE.sky }}>1</span><span>Walk the shelf. The books run in order of publication, from Austen to the present day.</span></div>
                  <div className="intro-step"><span className="istep-n" style={{ background: PALETTE.lantern }}>2</span><span>Tap a cover for the full entry: the description, the awards, and who vouches for it.</span></div>
                  <div className="intro-step"><span className="istep-n" style={{ background: PALETTE.forest }}>3</span><span>Add your name up top, then mark what you've read and star what you love.</span></div>
                  <div className="intro-step"><span className="istep-n" style={{ background: PALETTE.sunset }}>4</span><span>Bring a book. Anything you add joins the trail with your name beside it.</span></div>
                </div>
              </div>
            )}
            {sections.map((sec) => (
              <section key={sec.label}>
                <h2 className="era">{sec.label}</h2>
                <div className="grid">
                  {sec.books.map((b) => (
                    <button key={b.id} className="card" onClick={() => setDetailId(b.id)}>
                      <Cover book={b} size="thumb" />
                      <p className="card-desc">{b.description}</p>
                    </button>
                  ))}
                </div>
              </section>
            ))}
            </div>
          )}
        </main>
      </div>

      <div className="pills">
        <button className="pill pill-filter" onClick={() => setShowFilter(true)}>
          Filter{filterCount > 0 ? " · " + filterCount : ""}
        </button>
        <button className="pill pill-add" onClick={() => (me ? setShowAdd(true) : setShowProfile(true))}>Add a book</button>
      </div>

      {showFilter && (
        <div className="sheet-back" onClick={() => setShowFilter(false)}>
          <div className="sheet" onClick={(e) => e.stopPropagation()}>
            <div className="sheet-handle" />
            <h3 className="sheet-title">Find your next book</h3>
            <FilterControls filters={filters} setFilters={setFilters} count={filtered.length} extras={extras} onApply={() => setShowFilter(false)} />
          </div>
        </div>
      )}

      {showMenu && (
        <div className="menu-back" onClick={() => setShowMenu(false)}>
          <nav className="menu" onClick={(e) => e.stopPropagation()}>
            <div className="menu-head">The Trail</div>
            <button className="menu-item" onClick={() => { setShelfMode("all"); setShowMenu(false); }}>The whole trail <span className="menu-count">{allBooks.length}</span></button>
            <button className="menu-item" onClick={() => { me ? setShelfMode("mine") : setShowProfile(true); setShowMenu(false); }}>Your trail</button>
            <button className="menu-item" onClick={() => { me ? setShelfMode("read") : setShowProfile(true); setShowMenu(false); }}>Walked <span className="menu-count">{myRead}</span></button>
            <button className="menu-item" onClick={() => { me ? setShelfMode("toread") : setShowProfile(true); setShowMenu(false); }}>Ahead <span className="menu-count">{allBooks.length - myRead}</span></button>
            <button className="menu-item" onClick={() => { me ? setShelfMode("starred") : setShowProfile(true); setShowMenu(false); }}>Starred <span className="menu-count">{myStarred}</span></button>
            <button className="menu-item" onClick={() => { me ? setShelfMode("suggested") : setShowProfile(true); setShowMenu(false); }}>Suggested for you</button>
            <div className="menu-rule" />
            <button className="menu-item" onClick={() => { setShowMenu(false); me ? setShowAdd(true) : setShowProfile(true); }}>Add a book</button>
            <button className="menu-item" onClick={() => { setShowMenu(false); setShowProfile(true); }}>Switch reader</button>
            <button className="menu-item" onClick={() => { setShelfMode("all"); setFilters({ fam: [], awards: [], tags: [] }); setIntroOpen(true); setShowMenu(false); window.scrollTo({ top: 0, behavior: "smooth" }); }}>About the trail</button>
          </nav>
        </div>
      )}

      {showProfile && (
        <ProfileSheet me={me} allNames={allNames} colorOf={colorOf} choose={chooseProfile} close={() => setShowProfile(false)} firstRun={!me} />
      )}

      {detail && (
        <DetailPage
          book={detail}
          me={me}
          allNames={allNames}
          colorOf={colorOf}
          isRead={isRead}
          isStarred={isStarred}
          toggleRead={toggleRead}
          toggleStar={toggleStar}
          close={() => setDetailId(null)}
          needProfile={() => setShowProfile(true)}
        />
      )}

      {showAdd && me && (
        <AddFlow
          me={me}
          allBooks={allBooks}
          added={added}
          onCommit={async (book) => {
            const next = added.concat([book]);
            setAdded(next);
            try { await writeMain(familyId, { added: next }); }
            catch (e) { console.error("write added failed", e); }
            setShowAdd(false);
            setDetailId(book.id);
          }}
          onRecommendExisting={(book) => { toggleStar(book); setShowAdd(false); setDetailId(book.id); }}
          isStarred={isStarred}
          close={() => setShowAdd(false)}
        />
      )}

      {!loaded && (
        <div className="loading">
          <img src={MARK} alt="" />
          <p>Still loading. The trail is long.</p>
        </div>
      )}
    </div>
  );
}

/* ---------- filter controls ---------- */
function FilterControls({ filters, setFilters, count, inRail, extras, onApply }) {
  const [open, setOpen] = useState({ fam: true, awards: !!inRail, tags: !!inRail });
  const toggle = (dim, val) => setFilters((f) => {
    const has = f[dim].includes(val);
    return { ...f, [dim]: has ? f[dim].filter((x) => x !== val) : f[dim].concat([val]) };
  });
  const famNames = MEMBERS.map((m) => ({ name: m.name, color: PALETTE[m.color] }))
    .concat((extras || []).map((e) => ({ name: e.name, color: PALETTE[e.color] })))
    .sort((a, b) => a.name.localeCompare(b.name));
  return (
    <div className="fc">
      <div className="fc-group">
        <button className="fc-head" onClick={() => setOpen((o) => ({ ...o, fam: !o.fam }))}>Recommended by</button>
        {open.fam && (
          <div className="fc-chips">
            <button className={"chip " + (filters.fam.includes("ANYONE") ? "chip-on" : "")} onClick={() => toggle("fam", "ANYONE")}>Anyone in the family</button>
            <button className={"chip " + (filters.fam.includes("NOONE") ? "chip-on" : "")} onClick={() => toggle("fam", "NOONE")}>No one yet</button>
            {famNames.map((m) => (
              <button
                key={m.name}
                className={"chip " + (filters.fam.includes(m.name) ? "chip-fam-on" : "")}
                style={filters.fam.includes(m.name) ? { background: m.color, borderColor: "#1F1A14" } : null}
                onClick={() => toggle("fam", m.name)}
              >{m.name}</button>
            ))}
          </div>
        )}
      </div>
      <div className="fc-group">
        <button className="fc-head" onClick={() => setOpen((o) => ({ ...o, awards: !o.awards }))}>Awards</button>
        {open.awards && (
          <div className="fc-chips">
            {AWARD_FILTERS.map((a) => (
              <button key={a.label} className={"chip " + (filters.awards.includes(a.label) ? "chip-on" : "")} onClick={() => toggle("awards", a.label)}>{a.label}</button>
            ))}
          </div>
        )}
      </div>
      <div className="fc-group">
        <button className="fc-head" onClick={() => setOpen((o) => ({ ...o, tags: !o.tags }))}>Kind of book</button>
        {open.tags && Object.keys(TAG_GROUPS).map((g) => (
          <div key={g}>
            <div className="fc-sub">{g}</div>
            <div className="fc-chips">
              {TAG_GROUPS[g].map((t) => (
                <button key={t} className={"chip " + (filters.tags.includes(t) ? "chip-on" : "")} onClick={() => toggle("tags", t)}>{t}</button>
              ))}
            </div>
          </div>
        ))}
      </div>
      {!inRail && (
        <div className="fc-foot">
          <button className="fc-clear" onClick={() => setFilters({ fam: [], awards: [], tags: [] })}>Clear all</button>
          <button className="btn btn-wide" onClick={onApply}>Show {count} {count === 1 ? "book" : "books"}</button>
        </div>
      )}
      {inRail && <div className="fc-railcount">{count} {count === 1 ? "book" : "books"} on the shelf</div>}
    </div>
  );
}

          <div className="d-author">{book.author} · {book.displayDate}</div>

              <div className="me-row" style={{ borderColor: colorOf(me) }}>

/* ---------- your trail ---------- */
function YourTrail({ me, allBooks, isRead, isStarred, suggestions, open }) {
  const starred = allBooks.filter((b) => isStarred(me, b));
  const read = allBooks.filter((b) => isRead(me, b.id));
  const Strip = ({ title, books, empty }) => (
    <section className="strip">
      <h2 className="era">{title}</h2>
      {books.length ? (
        <div className="strip-row">
          {books.map((b) => (
            <button key={b.id} className="card card-strip" onClick={() => open(b.id)}>
              <Cover book={b} size="thumb" />
            </button>
          ))}

      ) : (
        <p className="block-body muted strip-empty">{empty}</p>
      )}

    <div>
      <Strip title="Your recommendations" books={starred} empty="Star the books you love and they'll gather here." />

      <Strip title="Suggested for you" books={suggestions} empty="Star a few books and the trail will suggest where to walk next." />

/* ---------- add flow ---------- */
function AddFlow({ me, allBooks, onCommit, onRecommendExisting, isStarred, close }) {
  const [step, setStep] = useState(0);
  const [title, setTitle] = useState("");
  const [author, setAuthor] = useState("");
  const [year, setYear] = useState("");
  const [note, setNote] = useState("");
  const [dup, setDup] = useState(null);
  const [gen, setGen] = useState(null);
  const [error, setError] = useState(null);

  const checkDup = () => {
    const t = title.trim().toLowerCase();
    const found = allBooks.find((b) => b.title.toLowerCase() === t);
    if (found) { setDup(found); return; }
    setDup(null); setStep(1);
  };

  const yearNum = parseInt(year, 10);
  const neighbors = useMemo(() => {
    if (!yearNum || yearNum < 1500 || yearNum > 2100) return null;
    let before = null, after = null;
    for (const b of allBooks) {
      if (b.sortYear <= yearNum) before = b;
      if (b.sortYear > yearNum && !after) after = b;
    }
    return { before, after };
  }, [yearNum, allBooks]);

  const vocab = useMemo(() => Object.values(TAG_GROUPS).flat(), []);
  const prompt = useMemo(() => {
    const samples = [allBooks[0], allBooks[40], allBooks[150]].filter(Boolean)
      .map((b) => b.title + " by " + b.author + ": " + b.description).join("\n\n");
    return [
      "You are the editor of The Trail, a family reading list. Write a catalogue entry for this book:",
      "Title: " + title.trim(),
      "Author: " + author.trim(),
      "Published: " + year,
      "A family member, " + me + ", recommends it and says: " + (note.trim() || "(no note)"),
      "",
      "Voice rules: three to four sentences, evaluative but unfussy, warm but never gushing, the New Yorker register. Plain natural language. Never use em dashes. You may echo the family member's reason but never quote it.",
      "",
      "Three entries from the list, to match the register exactly:",
      samples,
      "",
      "Choose two to four tags from this closed vocabulary and invent none: " + vocab.join(", "),
      "",
      "List major literary awards the book has won only if you are certain, formatted like 'Pulitzer Prize (2007)'. Otherwise return an empty list.",
      "",
      'Respond ONLY with a JSON object, no markdown fences, no preamble: {"description": "...", "tags": ["..."], "awards": ["..."]}'
    ].join("\n");
  }, [title, author, year, note, me, allBooks, vocab]);

  const acceptParsed = (parsed) => {
    const cleanTags = (parsed.tags || []).filter((t) => vocab.includes(t));
    setGen({
      description: (parsed.description || "").trim(),
      tags: cleanTags.length ? cleanTags : ["Contemporary"],
      awards: parsed.awards || []
    });
    setStep(4); setError(null);
  };

  const generate = async () => {
    setError(null);
    if (window.TRAIL_WRITER_URL) {
      setStep(3);
      try {
        const r = await fetch(window.TRAIL_WRITER_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ title: title.trim(), author: author.trim(), year, note: note.trim(), me, prompt })
        });
        if (!r.ok) throw new Error("writer returned " + r.status);
        const data = await r.json();
        acceptParsed(data);
        return;
      } catch (e) {
        setError("Our writer isn't reachable. Copy the prompt below into Claude and paste the reply.");
      }
    }
    setStep(3.5);
  };

  const usePastedReply = (raw) => {
    try {
      const clean = raw.replace(/```json|```/g, "").trim();
      const parsed = JSON.parse(clean);
      acceptParsed(parsed);
    } catch (e) {
      setError("That doesn't parse as JSON yet. Try copying the whole reply, braces included.");
    }
  };

  const copyPrompt = () => {
    if (navigator.clipboard) navigator.clipboard.writeText(prompt).catch(() => {});
  };

  const commit = () => {
    const color = ROTATION[Math.abs(yearNum + title.length) % 6];
    onCommit({
      id: "fam-" + Date.now(),
      title: title.trim(),
      author: author.trim(),
      sortYear: yearNum,
      displayDate: String(yearNum),
      seq: Date.now(),
      description: gen.description.trim(),
      family: [me],
      sources: [],
      awards: gen.awards,
      tags: gen.tags,
      color: color,
      note: note.trim(),
      addedBy: me
    });
  };

  return (
    <div className="flow">
      <button className="back" onClick={close}>‹ Never mind</button>
      <div className="flow-dots">{[0, 1, 2, 4].map((s, i) => <span key={i} className={"fdot " + (step >= s ? "fdot-on" : "")} />)}</div>
      <div className="flow-inner">
        {step === 0 && (
          <div>
            <h2 className="flow-q">What book are you bringing?</h2>
            <input className="input input-serif" placeholder="Title" value={title} onChange={(e) => { setTitle(e.target.value); setDup(null); }} />
            <input className="input input-serif input-ital" placeholder="Author" value={author} onChange={(e) => setAuthor(e.target.value)} />
            {dup && (
              <div className="dup">
                <p>Good news. {dup.title} is already on the trail. Want your name beside it?</p>
                <div className="dup-row">
                  {!isStarred(me, dup) && <button className="btn" onClick={() => onRecommendExisting(dup)}>Add my recommendation</button>}
                  <button className="fc-clear" onClick={() => { setDup(null); setStep(1); }}>It's a different book</button>
                </div>
              </div>
            )}
            <button className="btn btn-wide" disabled={!title.trim() || !author.trim()} onClick={checkDup}>Next</button>
          </div>
        )}
        {step === 1 && (
          <div>
            <h2 className="flow-q">When was it published?</h2>
            <input className="input input-serif" placeholder="Year" inputMode="numeric" value={year} onChange={(e) => setYear(e.target.value.replace(/\D/g, "").slice(0, 4))} />
            {neighbors && (
              <p className="flow-context">
                It will join the trail
                {neighbors.before ? " after " + neighbors.before.title : ""}
                {neighbors.after ? (neighbors.before ? " and before " : " before ") + neighbors.after.title : ""}.
              </p>
            )}
            <button className="btn btn-wide" disabled={!neighbors} onClick={() => setStep(2)}>Next</button>
          </div>
        )}
        {step === 2 && (
          <div>
            <h2 className="flow-q">Why this one?</h2>
            <p className="flow-help">A line or two. Why should the family read it?</p>
            <textarea className="input input-area" value={note} onChange={(e) => setNote(e.target.value)} />
            <button className="btn btn-wide" disabled={!note.trim()} onClick={generate}>Next</button>
          </div>
        )}
        {step === 3 && (
          <div className="flow-wait" style={{ background: PALETTE.lantern }}>
            <img src={MARK} alt="" />
            <p>Give us a moment. We're writing it up properly.</p>
          </div>
        )}
        {step === 3.5 && (
          <ManualWriter prompt={prompt} error={error} onCopy={copyPrompt} onPaste={usePastedReply} />
        )}
        {step === 4 && gen && (
          <div>
            <h2 className="flow-q">Here's the entry. Change anything we got wrong.</h2>
            {error && <p className="flow-error">{error}</p>}
            <div className="preview">
              <div className="preview-cover">
                <Cover book={{ title: title.trim(), author: author.trim(), displayDate: String(yearNum), color: ROTATION[Math.abs(yearNum + title.length) % 6] }} size="full" />
              </div>
              <textarea className="input input-area" value={gen.description} placeholder="The description, three to four lines." onChange={(e) => setGen((g) => ({ ...g, description: e.target.value }))} />
              <div className="fc-chips">
                {gen.tags.map((t) => (
                  <button key={t} className="chip chip-on" onClick={() => setGen((g) => ({ ...g, tags: g.tags.filter((x) => x !== t) }))}>{t} ×</button>
                ))}
              </div>
              <details className="tag-picker">
                <summary>Add a tag</summary>
                <div className="fc-chips">
                  {Object.values(TAG_GROUPS).flat().filter((t) => !gen.tags.includes(t)).map((t) => (
                    <button key={t} className="chip" onClick={() => setGen((g) => ({ ...g, tags: g.tags.concat([t]) }))}>{t}</button>
                  ))}
                </div>
              </details>
              <input className="input" placeholder="Awards, separated by commas, or leave empty" value={gen.awards.join(", ")} onChange={(e) => setGen((g) => ({ ...g, awards: e.target.value.split(",").map((x) => x.trim()).filter(Boolean) }))} />
              <p className="flow-context">Recommended by {me}: "{note.trim()}"</p>
            </div>

function ManualWriter({ prompt, error, onCopy, onPaste }) {
  const [paste, setPaste] = useState("");
  const [copied, setCopied] = useState(false);
  const copy = () => { onCopy(); setCopied(true); setTimeout(() => setCopied(false), 1600); };
  return (
    <div>
      <h2 className="flow-q">A small detour.</h2>
      <p className="flow-help">Copy this into Claude, then paste the reply back here. We'll do the rest.</p>
      {error && <p className="flow-error">{error}</p>}
      <textarea className="input input-area input-prompt" value={prompt} readOnly />
      <button className="btn" onClick={copy}>{copied ? "Copied" : "Copy the prompt"}</button>
      <div style={{ height: 18 }} />
      <textarea
        className="input input-area"
        placeholder="Paste the JSON reply here"
        value={paste}
        onChange={(e) => setPaste(e.target.value)}
      />
      <button className="btn btn-wide" disabled={!paste.trim()} onClick={() => onPaste(paste)}>
        Use this reply
      </button>
    </div>
  );
}
