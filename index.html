const BOOKS = [{"id": 1, "title": "Pride and Prejudice", "author": "Jane Austen", "sortYear": 1813, "displayDate": "1813", "description": "Elizabeth Bennet has a quick mind, a complicated family, and no money, which in Regency England is a dangerous combination. Austen turns the marriage plot into a study of how two intelligent people unlearn their first impressions of each other. Two centuries on, it remains the most purely enjoyable serious novel in English. Start here if you have never read her, and reread it if you have.", "family": ["Letizia", "Martha"], "sources": ["Guardian Top 100", "Great Books Curriculum"], "awards": [], "tags": ["Classic", "Romance", "Literary Fiction", "Comedy"], "color": "sky"}, {"id": 2, "title": "Frankenstein", "author": "Mary Shelley", "sortYear": 1818, "displayDate": "1818", "description": "A young scientist assembles a creature from dead matter, brings it to life, and abandons it in horror. The creature, articulate and utterly alone, comes looking for an answer. Shelley was eighteen when she invented science fiction and asked the question technology still cannot shake: what do we owe the things we make? Short, strange, and far more moving than its monster-movie reputation suggests.", "family": ["Mary Kate"], "sources": ["Guardian Top 100", "Great Books Curriculum"], "awards": [], "tags": ["Classic", "Gothic", "Science Fiction", "Horror"], "color": "lantern"}, {"id": 3, "title": "The Red and the Black", "author": "Stendhal", "sortYear": 1830, "displayDate": "1830", "description": "Julien Sorel, a carpenter's son who worships Napoleon in secret, decides to conquer French society through the church, the salon, and the bedroom. Stendhal watches his ambition with an irony so cold it feels modern. This is the first novel to treat social climbing as psychology rather than melodrama, and every ambitious literary striver since descends from Julien. For anyone fascinated by ambition and its costs.", "family": [], "sources": ["Great Books Curriculum"], "awards": [], "tags": ["Classic", "Literary Fiction", "Coming of Age"], "color": "forest"}, {"id": 4, "title": "Eugene Onegin", "author": "Alexander Pushkin", "sortYear": 1833, "displayDate": "1833", "description": "A bored Petersburg dandy rejects the love of a young country woman, kills his friend in a pointless duel, and discovers too late what he threw away. Pushkin wrote it in verse, and Russians still know whole stanzas by heart. Everything Russian literature became starts in this slim book. Read it in the James Falen translation and you will understand why.", "family": [], "sources": ["Great Books Curriculum"], "awards": [], "tags": ["Classic", "Romance", "Russia"], "color": "sunset"}, {"id": 5, "title": "Père Goriot", "author": "Honoré de Balzac", "sortYear": 1835, "displayDate": "1835", "description": "In a shabby Paris boarding house, an old man bankrupts himself for two daughters who are ashamed of him, while a young law student watches and learns how the world actually works. Balzac wrote the great novel of money before anyone else understood that money would become the great subject. The final scene, a young man staring down at Paris and declaring war on it, has never been bettered.", "family": [], "sources": ["Great Books Curriculum"], "awards": [], "tags": ["Classic", "Literary Fiction", "Family Saga"], "color": "stone"}, {"id": 6, "title": "Dead Souls", "author": "Nikolai Gogol", "sortYear": 1842, "displayDate": "1842", "description": "A smooth operator named Chichikov travels provincial Russia buying the registration papers of dead serfs, a scheme so absurd it could only be profitable in a thoroughly corrupt system. Gogol's comedy is hallucinatory, grotesque, and somehow tender toward every fool it skewers. The funniest of the great Russian novels and the strangest. Read it when you need proof that satire can be beautiful.", "family": [], "sources": ["Great Books Curriculum"], "awards": [], "tags": ["Classic", "Satire", "Russia"], "color": "alpenglow"}, {"id": 7, "title": "The Count of Monte Cristo", "author": "Alexandre Dumas", "sortYear": 1844, "displayDate": "1844", "description": "Edmond Dantès is betrayed by three men, buried alive in an island prison for fourteen years, and emerges with a fortune and a plan. What follows is the most satisfying revenge plot ever constructed, and beneath it a real question about whether justice delayed can ever be justice at all. Over a thousand pages that read like three hundred. The definition of a book you cannot put down.", "family": [], "sources": ["Great Books Curriculum"], "awards": [], "tags": ["Classic", "Adventure", "Thriller", "Epic"], "color": "sky"}, {"id": 8, "title": "Jane Eyre", "author": "Charlotte Brontë", "sortYear": 1847, "displayDate": "1847", "description": "A penniless governess with no beauty, no family, and no prospects refuses to be diminished by anyone, including the brooding employer she loves. Charlotte Brontë invented a first-person voice so direct and morally exact that the novel still reads like a confidence shared across the table. The original and still the best story about holding your ground. Every reader in the family should meet Jane once.", "family": ["Letizia"], "sources": ["Guardian Top 100", "Great Books Curriculum"], "awards": [], "tags": ["Classic", "Gothic", "Romance", "Feminist"], "color": "lantern"}, {"id": 9, "title": "Wuthering Heights", "author": "Emily Brontë", "sortYear": 1847, "displayDate": "1847", "description": "Catherine and Heathcliff love each other with a violence that destroys two families across two generations of the Yorkshire moors. Emily Brontë wrote one novel and made it the strangest book of its century, a love story that refuses every comfort the genre promises. Nothing else in English literature feels like it. Read it in winter, preferably during a storm.", "family": ["Letizia", "Martha"], "sources": ["Guardian Top 100", "Great Books Curriculum"], "awards": [], "tags": ["Classic", "Gothic", "Romance"], "color": "forest"}, {"id": 10, "title": "Vanity Fair", "author": "William Makepeace Thackeray", "sortYear": 1848, "displayDate": "1848", "description": "Becky Sharp claws her way from poverty into Regency high society armed with nothing but intelligence and a total absence of illusions. Thackeray subtitled it A Novel Without a Hero, which is honest, because everyone in it is compromised and most of them are hilarious. The sharpest social comedy of the Victorian age. Becky remains the most entertaining schemer in English fiction.", "family": [], "sources": ["Guardian Top 100", "Great Books Curriculum"], "awards": [], "tags": ["Classic", "Satire", "Comedy"], "color": "sunset"}, {"id": 11, "title": "The Scarlet Letter", "author": "Nathaniel Hawthorne", "sortYear": 1850, "displayDate": "1850", "description": "Hester Prynne stands on a Boston scaffold with a baby in her arms and a red letter on her dress, and refuses to name the father. Hawthorne turned Puritan New England into the first great examination of American shame, hypocrisy, and endurance. Hester is the first fully drawn woman in American fiction. Short enough to read in two evenings, heavy enough to stay for years.", "family": [], "sources": ["Great Books Curriculum"], "awards": [], "tags": ["Classic", "Literary Fiction", "Historical Fiction"], "color": "stone"}, {"id": 12, "title": "Moby-Dick", "author": "Herman Melville", "sortYear": 1851, "displayDate": "1851", "description": "A one-legged captain hunts the white whale that maimed him, dragging his crew toward the edge of the world. Melville folds whale chase, encyclopaedia, theology, and comedy into a single voice that no American writer has matched since. It failed at publication and is now simply the great American novel. Demanding, yes, but the rewards are proportional. Take it on a long holiday.", "family": [], "sources": ["Guardian Top 100", "Great Books Curriculum"], "awards": [], "tags": ["Classic", "Adventure", "Epic", "Philosophy & Ideas"], "color": "alpenglow"}, {"id": 13, "title": "Uncle Tom's Cabin", "author": "Harriet Beecher Stowe", "sortYear": 1852, "displayDate": "1852", "description": "Stowe set out to show America the human cost of slavery and produced the bestselling novel of the nineteenth century, a book Lincoln credited with helping start the Civil War. Parts have aged badly and the debates around it are real, but its central achievement stands: it made millions of readers feel what they had managed not to think about. Essential American history in novel form.", "family": [], "sources": ["Great Books Curriculum"], "awards": [], "tags": ["Classic", "Historical Fiction", "Race & Identity"], "color": "sky"}, {"id": 14, "title": "Madame Bovary", "author": "Gustave Flaubert", "sortYear": 1857, "displayDate": "1857", "description": "Emma Bovary, married to a dull country doctor, tries to live the life she has read about in novels, and the gap between her dreams and her debts closes like a trap. Flaubert rewrote every sentence until it was inevitable, and modern prose still lives in his shadow. The most perfectly written novel in French. Read it for the style, stay for the devastation.", "family": [], "sources": ["Guardian Top 100", "Great Books Curriculum"], "awards": [], "tags": ["Classic", "Literary Fiction", "Romance"], "color": "lantern"}, {"id": 15, "title": "A Tale of Two Cities", "author": "Charles Dickens", "sortYear": 1859, "displayDate": "1859", "description": "London and Paris on either side of the French Revolution, a dissolute lawyer who finds one thing worth dying for, and the most famous first and last lines in English fiction. Dickens at his most cinematic, trading his usual sprawl for momentum. If someone in the family wants a Dickens that moves like a thriller, this is the one.", "family": ["Tim", "Allan"], "sources": [], "awards": [], "tags": ["Classic", "Historical Fiction", "Adventure"], "color": "forest"}, {"id": 16, "title": "Great Expectations", "author": "Charles Dickens", "sortYear": 1861, "displayDate": "1861", "description": "An orphan named Pip receives a fortune from a mysterious benefactor and learns, slowly and painfully, what becoming a gentleman actually costs. Dickens compressed everything he knew about class, shame, and love into his tightest novel. The convict on the marshes, Miss Havisham in her wedding dress, these scenes are permanent furniture of the English imagination.", "family": ["Letizia"], "sources": ["Guardian Top 100", "Great Books Curriculum"], "awards": [], "tags": ["Classic", "Coming of Age", "Literary Fiction"], "color": "sunset"}, {"id": 17, "title": "Les Misérables", "author": "Victor Hugo", "sortYear": 1862, "displayDate": "1862", "description": "Jean Valjean steals a loaf of bread, serves nineteen years, and spends the rest of his life being hunted by a policeman who believes mercy is a category error. Hugo wrote the conscience of a century into fifteen hundred pages of moral imagination. Yes, it is long. It is also one of the few books that genuinely changes how readers treat other people. Worth every page.", "family": [], "sources": ["Great Books Curriculum"], "awards": [], "tags": ["Classic", "Epic", "Historical Fiction"], "color": "stone"}, {"id": 18, "title": "Fathers and Sons", "author": "Ivan Turgenev", "sortYear": 1862, "displayDate": "1862", "description": "A young doctor who believes in nothing comes home from university and collides with his father's generation, his friend's family, and a woman who unsettles all his theories. Turgenev gave the world the word nihilist and the calmest, most elegant of the great Russian novels. The perfect entry point to Russian literature: short, clear, and quietly heartbreaking.", "family": [], "sources": ["Great Books Curriculum"], "awards": [], "tags": ["Classic", "Literary Fiction", "Russia", "Family Saga"], "color": "alpenglow"}, {"id": 19, "title": "Crime and Punishment", "author": "Fyodor Dostoevsky", "sortYear": 1866, "displayDate": "1866", "description": "A starving student murders a pawnbroker to prove a theory about extraordinary men, and spends the rest of the novel being dismantled by his own conscience and a detective who is in no hurry. Dostoevsky invented the psychological thriller and the police procedural in one stroke. The most propulsive of the Russian classics. Once Raskolnikov picks up the axe, you will not stop.", "family": [], "sources": ["Guardian Top 100", "Great Books Curriculum"], "awards": [], "tags": ["Classic", "Crime", "Thriller", "Russia", "Philosophy & Ideas"], "color": "sky"}, {"id": 20, "title": "Middlemarch", "author": "George Eliot", "sortYear": 1871, "displayDate": "1871–72", "description": "A young woman of large ideals marries a dried-up scholar, a young doctor marries a beautiful spendthrift, and a provincial English town slowly teaches them both what a life can actually hold. Eliot was the deepest intellect ever to write English fiction, and this is her masterpiece. Many serious readers call it the best novel in the language. They have a case.", "family": ["Martha"], "sources": ["Guardian Top 100", "Great Books Curriculum"], "awards": [], "tags": ["Classic", "Literary Fiction", "Family Saga"], "color": "lantern"}, {"id": 21, "title": "Anna Karenina", "author": "Leo Tolstoy", "sortYear": 1877, "displayDate": "1877", "description": "A married woman falls in love with a cavalry officer in a society that will forgive the affair but never the honesty about it, while across the novel a landowner named Levin searches for a reason to live. Tolstoy inhabits every consciousness in every room, from a Moscow ball to a deathbed, with a completeness no other writer has reached. Often called the most perfect novel ever written. The family agrees.", "family": ["Tim", "Lenora"], "sources": ["Guardian Top 100", "Great Books Curriculum"], "awards": [], "tags": ["Classic", "Literary Fiction", "Romance", "Russia", "Epic"], "color": "forest"}, {"id": 22, "title": "The Portrait of a Lady", "author": "Henry James", "sortYear": 1881, "displayDate": "1881", "description": "Isabel Archer, young, American, and suddenly rich, arrives in Europe determined to meet her destiny on her own terms, and freely chooses the one man who will imprison her. James built the modern psychological novel around that single, terrible choice. Slow by design and devastating by accumulation. For readers who want to watch consciousness itself rendered on the page.", "family": [], "sources": ["Guardian Top 100", "Great Books Curriculum"], "awards": [], "tags": ["Classic", "Literary Fiction"], "color": "sunset"}, {"id": 23, "title": "The Adventures of Huckleberry Finn", "author": "Mark Twain", "sortYear": 1884, "displayDate": "1884", "description": "A boy fakes his own death and floats down the Mississippi with a runaway slave, and somewhere on that raft decides he would rather go to hell than betray his friend. Hemingway said all American literature comes from this book, and he was right. Funny, troubling, endlessly argued over, and still the great American story of conscience against custom.", "family": [], "sources": ["Great Books Curriculum"], "awards": [], "tags": ["Classic", "Adventure", "Coming of Age", "Race & Identity"], "color": "stone"}, {"id": 24, "title": "Germinal", "author": "Émile Zola", "sortYear": 1885, "displayDate": "1885", "description": "A coal miners' strike in northern France, rendered with documentary precision and the force of opera. Zola went down the mines to research it, and you can feel the dark and the dust on every page. The most powerful political novel of its century and the book that made labour visible to literature. Read it and you will never think about the word strike the same way.", "family": [], "sources": ["Great Books Curriculum"], "awards": [], "tags": ["Classic", "Historical Fiction", "Social Novel"], "color": "alpenglow"}, {"id": 25, "title": "The Picture of Dorian Gray", "author": "Oscar Wilde", "sortYear": 1890, "displayDate": "1890", "description": "A beautiful young man wishes his portrait would age in his place, and gets exactly what he asked for. Wilde wrapped the most serious English novel about pleasure and corruption inside the wittiest dialogue ever printed. Every epigram still lands. Short, scandalous in its day, and perfect for a reader who wants their philosophy delivered with style.", "family": ["Letizia"], "sources": ["Great Books Curriculum"], "awards": [], "tags": ["Classic", "Gothic", "Philosophy & Ideas"], "color": "sky"}, {"id": 26, "title": "Tess of the d'Urbervilles", "author": "Thomas Hardy", "sortYear": 1891, "displayDate": "1891", "description": "A poor country girl is sent to claim kinship with a wealthy family, and Victorian morality grinds her down with the indifference of weather. Hardy's fury at the world he describes burns through every page, and his Wessex landscapes are among the glories of English prose. Heartbreaking in the fullest sense. Keep tissues within reach.", "family": [], "sources": ["Great Books Curriculum"], "awards": [], "tags": ["Classic", "Literary Fiction", "Tragedy"], "color": "lantern"}, {"id": 27, "title": "The Yellow Wallpaper", "author": "Charlotte Perkins Gilman", "sortYear": 1892, "displayDate": "1892", "description": "A woman is confined to a room by her physician husband for her nerves, and begins to see something moving behind the wallpaper. Six thousand words, one descent, and a founding text of feminist literature. Gilman wrote it after her own rest cure nearly destroyed her. Read it in one sitting, which is the only way it can be read, and then find someone to discuss it with immediately.", "family": ["Mary Kate"], "sources": [], "awards": [], "tags": ["Classic", "Gothic", "Horror", "Feminist", "Short Read"], "color": "forest"}, {"id": 28, "title": "Dracula", "author": "Bram Stoker", "sortYear": 1897, "displayDate": "1897", "description": "A London solicitor travels to a Transylvanian castle to close a property deal, and brings something back. Stoker assembled the modern vampire myth from letters, diaries, and newspaper clippings, inventing both a monster and a way of telling. Far stranger and more gripping than a century of adaptations suggests. The original is always better. This proves it.", "family": [], "sources": ["Guardian Top 100", "Great Books Curriculum"], "awards": [], "tags": ["Classic", "Gothic", "Horror"], "color": "sunset"}, {"id": 29, "title": "The Awakening", "author": "Kate Chopin", "sortYear": 1899, "displayDate": "1899", "description": "A married woman in Louisiana discovers her own desires, her own talent, and her own will, and refuses to apologise for any of them. The novel was banned, Chopin's career was destroyed, and the book waited half a century to be recognised as a founding text of American feminism. Slim, sensuous, and decades ahead of its time.", "family": [], "sources": ["Great Books Curriculum"], "awards": [], "tags": ["Classic", "Feminist", "Literary Fiction", "Short Read"], "color": "stone"}, {"id": 30, "title": "Heart of Darkness", "author": "Joseph Conrad", "sortYear": 1902, "displayDate": "1902", "description": "Marlow pilots a steamboat up the Congo in search of Kurtz, a company agent who has become something the company cannot name. Conrad packed the entire moral void of European colonialism into a hundred pages that fiction has been arguing with ever since. Dense, troubling, essential. Read it alongside Things Fall Apart and let the two books argue across the century.", "family": [], "sources": ["Modern Library Top 100", "Guardian Top 100", "Oxford Curated"], "awards": [], "tags": ["Modern Classic", "Literary Fiction", "Postcolonial", "Short Read"], "color": "alpenglow"}, {"id": 31, "title": "The Immoralist", "author": "André Gide", "sortYear": 1902, "displayDate": "1902", "description": "A young French scholar nearly dies of tuberculosis in North Africa, recovers, and decides that everything his disciplined life had refused him is precisely what he wants. Gide's confessional novella opened French literature to honesty about desire and its costs. Slim, elegant, and quietly subversive. For the reader who likes their philosophy carried by a story.", "family": ["Tom"], "sources": [], "awards": [], "tags": ["Modern Classic", "Literary Fiction", "Philosophy & Ideas", "Short Read"], "color": "sky"}, {"id": 32, "title": "The Ambassadors", "author": "Henry James", "sortYear": 1903, "displayDate": "1903", "description": "Lambert Strether is sent to Paris to retrieve a widow's wayward son and instead discovers, at fifty-five, that he has never actually lived. James thought it his best book, and his advice through Strether is the most quoted in his work: live all you can, it's a mistake not to. Late James asks patience and repays it with interest.", "family": ["Tom"], "sources": [], "awards": [], "tags": ["Modern Classic", "Literary Fiction"], "color": "lantern"}, {"id": 33, "title": "Nostromo", "author": "Joseph Conrad", "sortYear": 1904, "displayDate": "1904", "description": "A silver mine in a fictional South American republic corrupts everyone who touches it: the idealist, the journalist, the incorruptible man of the people whose name gives the book its title. Conrad's most ambitious novel and his coldest study of what money does to character. The political novel against which others are measured.", "family": ["Tom"], "sources": [], "awards": [], "tags": ["Modern Classic", "Literary Fiction", "Political Fiction"], "color": "forest"}, {"id": 34, "title": "The Scarlet Pimpernel", "author": "Baroness Orczy", "sortYear": 1905, "displayDate": "1905", "description": "An apparently useless English fop is secretly the daring mastermind smuggling French aristocrats out from under the guillotine. Orczy invented the secret-identity hero a full century before the comic books industrialised the idea. Pure adventure, played with wit and total conviction. The book to hand a teenager who claims classics are boring.", "family": ["Mary Kate"], "sources": [], "awards": [], "tags": ["Classic", "Adventure", "Historical Fiction"], "color": "sunset"}, {"id": 35, "title": "White Fang", "author": "Jack London", "sortYear": 1906, "displayDate": "1906", "description": "A wolf-dog born wild in the Yukon learns cruelty from men and then, against everything his life has taught him, learns kindness. London wrote it as the mirror of The Call of the Wild, taming where the other ran wild. An adventure novel with real moral weight, and a book that has made generations of readers love dogs and fear people.", "family": ["Bobby"], "sources": [], "awards": [], "tags": ["Classic", "Adventure", "Nature & Wilderness"], "color": "stone"}, {"id": 36, "title": "In Search of Lost Time", "author": "Marcel Proust", "sortYear": 1913, "displayDate": "1913–27", "description": "A man bites into a madeleine dipped in tea and an entire lost world returns. Seven volumes of memory, jealousy, social comedy, and the slow discovery that time can be recovered through art. The most ambitious project in modern literature and, for readers who give it the months it asks, the most rewarding. The family member who finishes it earns permanent bragging rights.", "family": [], "sources": ["Great Books Curriculum", "Guardian Top 100", "Oxford Curated"], "awards": [], "tags": ["Modern Classic", "Literary Fiction", "Epic", "Philosophy & Ideas"], "color": "alpenglow"}, {"id": 37, "title": "The Rainbow", "author": "D.H. Lawrence", "sortYear": 1915, "displayDate": "1915", "description": "Three generations of a Nottinghamshire farming family, rendered with a physical and emotional intensity nothing in Edwardian fiction had attempted. Lawrence taught the English novel to take the body seriously, and the censors banned the book for it. The portrait of Ursula Brangwen, reaching for a larger life than anyone around her can imagine, still feels contemporary.", "family": [], "sources": ["Guardian Top 100", "Oxford Curated"], "awards": [], "tags": ["Modern Classic", "Family Saga", "Literary Fiction"], "color": "sky"}, {"id": 38, "title": "Women in Love", "author": "D.H. Lawrence", "sortYear": 1920, "displayDate": "1920", "description": "Two sisters and two men in the English Midlands test the limits of love, friendship, and what one person can actually know of another. Lawrence's most demanding novel and his most alive, written in prose that runs hot on every page. For readers who want fiction that argues with them. Pairs naturally with The Rainbow, which precedes it.", "family": ["Sue"], "sources": [], "awards": [], "tags": ["Modern Classic", "Literary Fiction", "Romance"], "color": "lantern"}, {"id": 39, "title": "The Age of Innocence", "author": "Edith Wharton", "sortYear": 1920, "displayDate": "1920", "description": "Newland Archer is engaged to the perfect May Welland when her unconventional cousin Ellen arrives trailing a European scandal, and old New York closes ranks with exquisite politeness. Wharton anatomised her own class from memory and won the first Pulitzer awarded to a woman. The final chapter is among the most quietly devastating in American fiction.", "family": [], "sources": ["Modern Library Top 100", "Guardian Top 100", "Oxford Curated"], "awards": ["Pulitzer Prize (1921)"], "tags": ["Modern Classic", "Literary Fiction", "Romance"], "color": "forest"}, {"id": 40, "title": "Ulysses", "author": "James Joyce", "sortYear": 1922, "displayDate": "1922", "description": "One Dublin day, June 16, 1904, followed through the minds of Leopold Bloom, Stephen Dedalus, and Molly Bloom in every style Joyce could invent or steal. The book that proved a novel could be anything at all and still hold together by sheer linguistic force. Difficult, funny, and inexhaustible. Take the guided approach: a good companion volume doubles the pleasure.", "family": [], "sources": ["Modern Library Top 100", "Guardian Top 100", "Oxford Curated"], "awards": [], "tags": ["Modern Classic", "Literary Fiction", "Epic"], "color": "sunset"}, {"id": 41, "title": "A Passage to India", "author": "E.M. Forster", "sortYear": 1924, "displayDate": "1924", "description": "An ambiguous incident in the Marabar Caves destroys a friendship between an English schoolteacher and an Indian doctor, and exposes everything the Raj is built on. Forster's last and most haunted novel asks whether genuine connection across empire is possible at all. His answer is not comforting, which is why the book lasts.", "family": [], "sources": ["Modern Library Top 100", "Oxford Curated"], "awards": [], "tags": ["Modern Classic", "Literary Fiction", "Postcolonial"], "color": "stone"}, {"id": 42, "title": "The Magic Mountain", "author": "Thomas Mann", "sortYear": 1924, "displayDate": "1924", "description": "A young engineer visits his cousin at a Swiss sanatorium for three weeks and stays seven years, while the whole of pre-war European thought argues itself to exhaustion around him. Mann turned a tuberculosis hospital into the great novel of ideas. Long, strange, frequently funny, and the most rewarding mountain in literature. A winter book, ideally read somewhere with snow.", "family": ["Tom"], "sources": ["Guardian Top 100", "Oxford Curated"], "awards": ["Nobel Prize (Mann, 1929)"], "tags": ["Modern Classic", "Philosophy & Ideas", "Epic"], "color": "alpenglow"}, {"id": 43, "title": "The Trial", "author": "Franz Kafka", "sortYear": 1925, "displayDate": "1925", "description": "Josef K. is arrested one morning for a crime no one will name, by a court no one can find, under a law no one has read. Kafka gave bureaucratic dread its permanent form and the twentieth century its defining adjective. Read it young and it is a nightmare; read it after dealing with any large institution and it is documentary realism.", "family": [], "sources": ["Great Books Curriculum", "Guardian Top 100", "Oxford Curated"], "awards": [], "tags": ["Modern Classic", "Literary Fiction", "Dystopia", "Philosophy & Ideas"], "color": "sky"}, {"id": 44, "title": "The Great Gatsby", "author": "F. Scott Fitzgerald", "sortYear": 1925, "displayDate": "1925", "description": "A mysterious millionaire throws legendary parties across the bay from the woman he reinvented himself to win back. Two hundred pages of prose so exact it still hurts to read, ending in the most famous closing lines in American fiction. The American dream examined, indulged, and buried in a single summer. The rare classic that everyone should simply reread every decade.", "family": ["Tom"], "sources": ["Modern Library Top 100", "Guardian Top 100", "Oxford Curated"], "awards": [], "tags": ["Modern Classic", "Literary Fiction", "Romance", "Short Read"], "color": "lantern"}, {"id": 45, "title": "An American Tragedy", "author": "Theodore Dreiser", "sortYear": 1925, "displayDate": "1925", "description": "A poor factory worker gets his girlfriend pregnant just as a wealthy heiress comes within reach, and begins to plan the unthinkable. Dreiser built his monument on a real murder case, and his indictment of the American dream has lost none of its force. Long, relentless, and unforgettable. The prosecution's case against ambition itself.", "family": ["Sue"], "sources": [], "awards": [], "tags": ["Modern Classic", "Crime", "Literary Fiction", "Tragedy"], "color": "forest"}, {"id": 46, "title": "The Sun Also Rises", "author": "Ernest Hemingway", "sortYear": 1926, "displayDate": "1926", "description": "American and British expatriates drift from Paris bars to the bullfights of Pamplona, wounded in ways none of them will discuss. Hemingway invented his style here, the prose of what is left out, and twentieth century writing never recovered. The portrait of the lost generation by its most famous member. Best read with a glass of rioja.", "family": [], "sources": ["Modern Library Top 100", "Oxford Curated"], "awards": ["Nobel Prize (Hemingway, 1954)"], "tags": ["Modern Classic", "Literary Fiction"], "color": "sunset"}, {"id": 47, "title": "To the Lighthouse", "author": "Virginia Woolf", "sortYear": 1927, "displayDate": "1927", "description": "A family summer in the Hebrides, a war that empties the house, and a return ten years later to finish a painting and a journey. Woolf compressed an entire emotional world into prose that moves like weather. The greatest English novel of consciousness, and the most beautiful book about how families remember themselves.", "family": [], "sources": ["Modern Library Top 100", "Guardian Top 100", "Oxford Curated"], "awards": [], "tags": ["Modern Classic", "Literary Fiction", "Family Saga"], "color": "stone"}, {"id": 48, "title": "The Sound and the Fury", "author": "William Faulkner", "sortYear": 1929, "displayDate": "1929", "description": "The fall of a Mississippi family told through four narrators, one of them cognitively impaired, one of them already dead by his own hand. Faulkner pushed the English sentence somewhere it had never been and never quite returned from. Demanding for the first fifty pages, overwhelming after that. The deepest of the great American modernist novels.", "family": [], "sources": ["Modern Library Top 100", "Guardian Top 100", "Oxford Curated"], "awards": ["Nobel Prize (Faulkner, 1949)"], "tags": ["Modern Classic", "Literary Fiction", "Family Saga", "American South"], "color": "alpenglow"}, {"id": 49, "title": "A Farewell to Arms", "author": "Ernest Hemingway", "sortYear": 1929, "displayDate": "1929", "description": "An American ambulance driver on the Italian front falls in love with a British nurse, and the war takes its time before presenting the bill. Hemingway's most romantic novel and his most devastating, with a final page that readers carry for the rest of their lives. He rewrote the ending thirty-nine times. It shows.", "family": ["Tom", "Mike"], "sources": [], "awards": [], "tags": ["Modern Classic", "War", "Romance"], "color": "sky"}, {"id": 50, "title": "Brave New World", "author": "Aldous Huxley", "sortYear": 1932, "displayDate": "1932", "description": "A future engineered for perfect happiness: no pain, no conflict, no families, just consumption, distraction, and a drug called soma. Huxley's dystopia predicted us far better than Orwell's did, which is exactly why it grows more unsettling every year. Read it with 1984 and decide which cage we actually built. The family debate practically organises itself.", "family": ["Mike"], "sources": ["Modern Library Top 100", "Oxford Curated"], "awards": [], "tags": ["Modern Classic", "Dystopia", "Science Fiction", "Philosophy & Ideas"], "color": "lantern"}, {"id": 51, "title": "Down and Out in Paris and London", "author": "George Orwell", "sortYear": 1933, "displayDate": "1933", "description": "Orwell scrubs dishes eighteen hours a day in Paris hotel kitchens, then sleeps rough through London with the tramps, and reports it all with the clear-eyed decency that became his signature. The book where his voice arrives. Anyone who has worked a brutal service job will recognise every page. Anyone who hasn't should read it before forming opinions about poverty.", "family": ["Nick"], "sources": [], "awards": [], "tags": ["Modern Classic", "Memoir", "Non-Fiction", "Social Novel"], "color": "forest"}, {"id": 52, "title": "Of Mice and Men", "author": "John Steinbeck", "sortYear": 1937, "displayDate": "1937", "description": "Two migrant workers in Depression California share a small dream: a few acres, some rabbits, a place of their own. Steinbeck wrote the great American tragedy in barely a hundred pages, and the ending still lands like a blow no matter how many times you have read it. The perfect introduction to Steinbeck and the shortest heartbreak in the American canon.", "family": ["Bobby"], "sources": [], "awards": [], "tags": ["Modern Classic", "Tragedy", "Short Read", "American South"], "color": "sunset"}, {"id": 53, "title": "The Hobbit", "author": "J.R.R. Tolkien", "sortYear": 1937, "displayDate": "1937", "description": "A comfortable, food-loving hobbit is talked out his front door by a wizard and thirteen dwarves to burgle a dragon. Tolkien wrote it for his children and accidentally opened the road to modern fantasy. Funnier and lighter than The Lord of the Rings, and the right starting point for any reader, of any age, entering Middle-earth for the first time.", "family": ["Nick"], "sources": [], "awards": [], "tags": ["Classic", "Fantasy", "Adventure", "Children & Young Readers"], "color": "stone"}, {"id": 54, "title": "Homage to Catalonia", "author": "George Orwell", "sortYear": 1938, "displayDate": "1938", "description": "Orwell went to Spain to fight fascism, took a sniper's bullet through the throat, and watched the revolution he was defending be destroyed by its own side. The book that made him the great political writer of the century, because he insisted on reporting what he saw rather than what the cause required. Required reading for anyone who cares about truth in politics.", "family": ["Tim", "Nick"], "sources": [], "awards": [], "tags": ["Modern Classic", "Memoir", "War", "History", "Non-Fiction"], "color": "alpenglow"}, {"id": 55, "title": "Rebecca", "author": "Daphne du Maurier", "sortYear": 1938, "displayDate": "1938", "description": "An unnamed young bride arrives at Manderley to find the house, the staff, and the sea itself still loyal to her husband's dead first wife. Du Maurier wrote the most influential suspense novel of the century, and its opening line alone has launched a thousand imitations. Gothic, propulsive, and impossible to put down. The book equivalent of a perfect storm-lashed weekend.", "family": ["Mary Kate"], "sources": ["Guardian Top 100"], "awards": [], "tags": ["Modern Classic", "Gothic", "Mystery", "Romance"], "color": "sky"}, {"id": 56, "title": "The Grapes of Wrath", "author": "John Steinbeck", "sortYear": 1939, "displayDate": "1939", "description": "The Joad family loads everything they own onto a truck and drives west from the Oklahoma dust bowl toward a California that wants their labour and nothing else. The greatest American novel of economic catastrophe, and still the country's moral test. Steinbeck's anger is matched only by his tenderness. The final scene remains the boldest in American fiction.", "family": [], "sources": ["Modern Library Top 100", "Oxford Curated"], "awards": ["Pulitzer Prize (1940)", "Nobel Prize (Steinbeck, 1962)"], "tags": ["Modern Classic", "Social Novel", "Family Saga", "Epic"], "color": "lantern"}, {"id": 57, "title": "For Whom the Bell Tolls", "author": "Ernest Hemingway", "sortYear": 1940, "displayDate": "1940", "description": "An American explosives expert joins a guerrilla band in the Spanish mountains with orders to blow a bridge, and three days to live an entire life. Hemingway's longest novel and his most political, built around the question of what one death is worth to a cause. The mountain scenes are among the best things he ever wrote.", "family": ["Tim"], "sources": [], "awards": [], "tags": ["Modern Classic", "War", "Romance", "Adventure"], "color": "forest"}, {"id": 58, "title": "The Power and the Glory", "author": "Graham Greene", "sortYear": 1940, "displayDate": "1940", "description": "In revolutionary Mexico, where the Church is outlawed, the last priest in the state is a drinker with an illegitimate daughter, hunted by a lieutenant who believes in his cause completely. Greene's deepest novel about grace, which he locates precisely where respectability would never look. The whisky priest is one of the great characters of the century.", "family": ["Tom"], "sources": [], "awards": [], "tags": ["Modern Classic", "Literary Fiction", "Faith & Spirit"], "color": "sunset"}, {"id": 59, "title": "Darkness at Noon", "author": "Arthur Koestler", "sortYear": 1940, "displayDate": "1940", "description": "An old Bolshevik sits in a Soviet prison, interrogated by the revolution he helped build, slowly persuaded to confess to crimes he never committed. Koestler exposed the logic of the show trials while they were still happening. The essential novel of totalitarianism, written from inside the faith and the disillusion both. Chillingly relevant whenever ideology eats its own.", "family": ["Tom"], "sources": [], "awards": [], "tags": ["Modern Classic", "Political Fiction", "Dystopia", "Russia"], "color": "stone"}, {"id": 60, "title": "The Stranger", "author": "Albert Camus", "sortYear": 1942, "displayDate": "1942", "description": "Meursault buries his mother without crying, kills a man on a beach without quite knowing why, and is condemned less for the murder than for refusing to perform the feelings society demands. Camus compressed existentialism into a novella you can finish in an afternoon and will think about for years. The most efficient philosophy lesson in fiction.", "family": [], "sources": ["Oxford Curated"], "awards": ["Nobel Prize (Camus, 1957)"], "tags": ["Modern Classic", "Philosophy & Ideas", "Short Read"], "color": "alpenglow"}, {"id": 61, "title": "A Tree Grows in Brooklyn", "author": "Betty Smith", "sortYear": 1943, "displayDate": "1943", "description": "Francie Nolan grows up poor in early-century Williamsburg, raised by a mother who scrubs floors and a father who sings and drinks, finding her way up through library books read on the fire escape. One of the most beloved American novels ever written, and one of the truest about what reading can do for a child. A book to pass down through generations, which is exactly what families do with it.", "family": ["Anne-Worley"], "sources": [], "awards": [], "tags": ["Modern Classic", "Coming of Age", "Family Saga"], "color": "sky"}, {"id": 62, "title": "The Little Prince", "author": "Antoine de Saint-Exupéry", "sortYear": 1943, "displayDate": "1943", "description": "A pilot crashes in the Sahara and meets a small boy from another planet, who tells him about a rose, a fox, and what the grown-ups have forgotten. A children's book that adults have refused to stop reading for eighty years, because the fox's secret is true: what is essential is invisible to the eye. Read it aloud to someone you love.", "family": ["Nick", "Letizia"], "sources": [], "awards": [], "tags": ["Classic", "Children & Young Readers", "Philosophy & Ideas", "Short Read"], "color": "lantern"}, {"id": 63, "title": "Ficciones", "author": "Jorge Luis Borges", "sortYear": 1944, "displayDate": "1944", "description": "Infinite libraries, gardens of forking paths, a man who dreams another man into existence. Borges never wrote a novel because he could fold one into eight pages. These stories reorganised the imagination of every writer who came after him. Read one per evening, slowly, and feel your sense of what fiction can do quietly expand.", "family": [], "sources": ["Oxford Curated"], "awards": [], "tags": ["Modern Classic", "Short Stories", "Fantasy", "Philosophy & Ideas"], "color": "forest"}, {"id": 64, "title": "Green Dolphin Street", "author": "Elizabeth Goudge", "sortYear": 1944, "displayDate": "1944", "description": "A young man in nineteenth century New Zealand writes home for the hand of one sister and, in a slip of the pen, names the other. She sails across the world to marry him, and he never tells her. Goudge spins from that single mistake a sweeping novel of love, faith, and the long consequences of a moment. A lost romantic classic that deserves rediscovery.", "family": ["Anne-Worley"], "sources": [], "awards": [], "tags": ["Classic", "Romance", "Historical Fiction", "Epic"], "color": "sunset"}, {"id": 65, "title": "The Razor's Edge", "author": "W. Somerset Maugham", "sortYear": 1944, "displayDate": "1944", "description": "Larry Darrell returns from the First World War unable to resume the life Chicago expects of him, and goes looking for something better across Europe and India. Maugham's most philosophical novel asks what a life is for, and refuses the easy answers. The original seeker's novel, and still the best one. For anyone at a crossroads, which is eventually everyone.", "family": ["Tim"], "sources": [], "awards": [], "tags": ["Modern Classic", "Philosophy & Ideas", "Literary Fiction"], "color": "stone"}, {"id": 66, "title": "If This Is a Man", "author": "Primo Levi", "sortYear": 1947, "displayDate": "1947", "description": "Levi survived Auschwitz and wrote down what happened with the precision of the chemist he was and the moral clarity of the witness he had to become. No anger where anger would blur the record, no comfort where comfort would falsify it. The essential book of the twentieth century's darkest event. Every member of every family should read it once.", "family": [], "sources": ["Oxford Curated"], "awards": [], "tags": ["Modern Classic", "Memoir", "History", "Non-Fiction", "War"], "color": "alpenglow"}, {"id": 67, "title": "The Heart of the Matter", "author": "Graham Greene", "sortYear": 1948, "displayDate": "1948", "description": "Major Scobie, a scrupulously honest police officer in colonial West Africa, is undone not by corruption but by pity, and by a God who refuses to look away. Greene's most theologically serious novel and one of his most humane. The portrait of a good man destroyed by his own goodness has rarely been equalled.", "family": [], "sources": ["Modern Library Top 100"], "awards": [], "tags": ["Modern Classic", "Literary Fiction", "Faith & Spirit"], "color": "sky"}, {"id": 68, "title": "1984", "author": "George Orwell", "sortYear": 1949, "displayDate": "1949", "description": "Winston Smith works at the Ministry of Truth, rewriting history, until he commits the crime of falling in love and believing the past actually happened. Big Brother, doublethink, Room 101: Orwell's inventions have leaked into every political argument of the last seventy-five years. Reread it as an adult. It is far better, and far darker, than you remember from school.", "family": [], "sources": ["Guardian Top 100", "Oxford Curated"], "awards": [], "tags": ["Modern Classic", "Dystopia", "Political Fiction", "Science Fiction"], "color": "lantern"}, {"id": 69, "title": "Molloy", "author": "Samuel Beckett", "sortYear": 1951, "displayDate": "1951", "description": "Two narrators search for things they cannot find across a landscape that may not exist, in prose that is somehow both desolate and very funny. Beckett stripped the novel down to its barest moving parts and found more life there, not less. For the adventurous reader ready to discover that nothing happening can be unputdownable.", "family": [], "sources": ["Oxford Curated"], "awards": ["Nobel Prize (Beckett, 1969)"], "tags": ["Modern Classic", "Literary Fiction", "Philosophy & Ideas"], "color": "forest"}, {"id": 70, "title": "The Catcher in the Rye", "author": "J.D. Salinger", "sortYear": 1951, "displayDate": "1951", "description": "Holden Caulfield, expelled from yet another prep school, spends three days adrift in New York, allergic to phoniness and unable to say what is actually wrong. The voice was so new that adolescence has been negotiating with it ever since. Read it at sixteen and Holden is a prophet. Read it at forty and he is a kid in pain. Both readings are correct.", "family": ["Tim"], "sources": ["Modern Library Top 100", "Oxford Curated"], "awards": [], "tags": ["Modern Classic", "Coming of Age"], "color": "sunset"}, {"id": 71, "title": "Invisible Man", "author": "Ralph Ellison", "sortYear": 1952, "displayDate": "1952", "description": "A young Black man travels from a Southern college to Harlem, through betrayals, riots, and reinventions, and discovers that no one he meets can actually see him. Ellison's only finished novel won the National Book Award and remains the deepest American book about race and identity. The prologue alone, written from a basement wired with 1,369 lightbulbs, is worth the price.", "family": [], "sources": ["Modern Library Top 100", "Guardian Top 100", "Oxford Curated"], "awards": ["National Book Award (1953)"], "tags": ["Modern Classic", "Race & Identity", "Literary Fiction"], "color": "stone"}, {"id": 72, "title": "East of Eden", "author": "John Steinbeck", "sortYear": 1952, "displayDate": "1952", "description": "Two families intertwine across the Salinas Valley as Steinbeck retells Cain and Abel on Californian soil, complete with one of fiction's most chilling mothers. He called it the book he had been practising for all his life. Sprawling, biblical, and built around a single Hebrew word, timshel, thou mayest, that carries the whole argument: we get to choose.", "family": ["Letizia"], "sources": [], "awards": [], "tags": ["Modern Classic", "Family Saga", "Epic", "American South"], "color": "alpenglow"}, {"id": 73, "title": "The Old Man and the Sea", "author": "Ernest Hemingway", "sortYear": 1952, "displayDate": "1952", "description": "An old Cuban fisherman, eighty-four days without a catch, hooks a marlin bigger than his boat and fights it alone for three days. The slimmest of Hemingway's books finally won him the Nobel, and its sentences are as clean as anything in English. A fable about defeat that is somehow the least defeated book imaginable. One sitting, total reward.", "family": ["Letizia"], "sources": [], "awards": [], "tags": ["Modern Classic", "Adventure", "Short Read", "Nature & Wilderness"], "color": "sky"}, {"id": 74, "title": "Lord of the Flies", "author": "William Golding", "sortYear": 1954, "displayDate": "1954", "description": "A planeload of English schoolboys crashes on a desert island with no adults, and civilisation lasts about a week. Golding's compressed parable of human nature won him the Nobel and has shocked classroom readers for seventy years. The question it asks, how thin is the veneer, has no comfortable answer. Short, brutal, unforgettable.", "family": [], "sources": ["Modern Library Top 100", "Oxford Curated"], "awards": ["Nobel Prize (Golding, 1983)"], "tags": ["Modern Classic", "Dystopia", "Adventure"], "color": "lantern"}, {"id": 75, "title": "Lolita", "author": "Vladimir Nabokov", "sortYear": 1955, "displayDate": "1955", "description": "A monstrous narrator tells the story of his crime in the most beautiful English ever written by a non-native speaker, and dares the reader to enjoy the prose while condemning the man. A novel about abuse that is also about America, exile, and what art can and cannot redeem. Uncomfortable by design, and a masterpiece by any measure.", "family": ["Tom"], "sources": ["Modern Library Top 100", "Guardian Top 100", "Oxford Curated"], "awards": [], "tags": ["Modern Classic", "Literary Fiction"], "color": "forest"}, {"id": 76, "title": "Atlas Shrugged", "author": "Ayn Rand", "sortYear": 1957, "displayDate": "1957", "description": "The industrialists, inventors, and builders of America vanish one by one, on strike against a world that calls their work exploitation. Rand's philosophical epic has inspired more devotion and more fury than any novel of ideas in American history. Read it to understand a strain of thinking that shaped the modern economy, whatever you conclude about it.", "family": ["Mike"], "sources": [], "awards": [], "tags": ["Philosophy & Ideas", "Political Fiction", "Epic", "Dystopia"], "color": "sunset"}, {"id": 77, "title": "Doctor Zhivago", "author": "Boris Pasternak", "sortYear": 1957, "displayDate": "1957", "description": "A doctor and poet is swept through revolution, civil war, and the destruction of everything he was raised in, holding onto one love across all of it. Pasternak smuggled the manuscript to Italy and won a Nobel he was forbidden to accept. The great Russian novel of the Soviet century, written from inside it. Epic in the truest sense.", "family": [], "sources": ["Oxford Curated"], "awards": ["Nobel Prize (Pasternak, 1958)"], "tags": ["Modern Classic", "Epic", "Romance", "War", "Russia"], "color": "stone"}, {"id": 78, "title": "The Leopard", "author": "Giuseppe Tomasi di Lampedusa", "sortYear": 1958, "displayDate": "1958", "description": "A Sicilian prince watches his world dissolve as Garibaldi's redshirts land and a new Italy assembles itself around him. Lampedusa wrote one novel, died before it was published, and left Italy its greatest book of the century. Everything must change so that everything can stay the same: the line, and the novel, only deepen with age. Read it before or after visiting Sicily, ideally both.", "family": ["Letizia"], "sources": ["Guardian Top 100", "Oxford Curated"], "awards": [], "tags": ["Modern Classic", "Historical Fiction", "Family Saga"], "color": "alpenglow"}, {"id": 79, "title": "Things Fall Apart", "author": "Chinua Achebe", "sortYear": 1958, "displayDate": "1958", "description": "Okonkwo, a self-made man in an Igbo village, watches the missionaries arrive and his world come apart, one accommodation at a time. Achebe ended the colonial monopoly on writing about Africa in under two hundred pages and founded modern African literature doing it. The necessary companion to every European novel about empire. Clear, devastating, essential.", "family": ["Tim"], "sources": ["Guardian Top 100", "Oxford Curated"], "awards": [], "tags": ["Modern Classic", "Postcolonial", "Historical Fiction", "Short Read"], "color": "sky"}, {"id": 80, "title": "Henderson the Rain King", "author": "Saul Bellow", "sortYear": 1959, "displayDate": "1959", "description": "Eugene Henderson, a millionaire pig farmer with a voice inside him chanting I want, I want, flies to Africa to find out what it wants. Bellow's wildest and funniest novel, an exuberant philosophical comedy about the hunger that success cannot feed. For any reader who has everything and still hears the voice.", "family": ["Tom"], "sources": [], "awards": [], "tags": ["Modern Classic", "Comedy", "Philosophy & Ideas", "Adventure"], "color": "lantern"}, {"id": 81, "title": "The Tin Drum", "author": "Günter Grass", "sortYear": 1959, "displayDate": "1959", "description": "Oskar Matzerath decides at age three to stop growing, and drums and shrieks his way through Germany's Nazi years with a child's body and an old man's eyes. Grass found the only register, grotesque and comic at once, in which postwar Germany could begin to look at itself. One of the strangest great novels ever written, and one of the bravest.", "family": [], "sources": ["Oxford Curated"], "awards": ["Nobel Prize (Grass, 1999)"], "tags": ["Modern Classic", "Historical Fiction", "Satire", "War"], "color": "forest"}, {"id": 82, "title": "To Kill a Mockingbird", "author": "Harper Lee", "sortYear": 1960, "displayDate": "1960", "description": "In Depression-era Alabama, a lawyer defends a Black man falsely accused of rape while his daughter Scout watches the town reveal itself. Lee's only finished novel taught generations what moral courage looks like at street level. Atticus Finch remains the father readers measure fathers against. If anyone in the family has somehow missed it, fix that this year.", "family": ["Letizia"], "sources": [], "awards": ["Pulitzer Prize (1961)"], "tags": ["Modern Classic", "Coming of Age", "Race & Identity", "American South"], "color": "sunset"}, {"id": 83, "title": "Catch-22", "author": "Joseph Heller", "sortYear": 1961, "displayDate": "1961", "description": "Captain Yossarian wants to stop flying bombing missions. He can be grounded only if he is insane, but asking to be grounded proves he is sane. Heller named the trap the century kept building and made institutional madness funnier than it has any right to be. Chaotic, repetitive, and brilliant by design. The war novel for people who distrust war novels.", "family": ["Tim"], "sources": ["Modern Library Top 100", "Guardian Top 100", "Oxford Curated"], "awards": [], "tags": ["Modern Classic", "Satire", "War", "Comedy"], "color": "stone"}, {"id": 84, "title": "The Game of Kings", "author": "Dorothy Dunnett", "sortYear": 1961, "displayDate": "1961", "description": "Francis Crawford of Lymond, scholar, outlaw, and the most dazzling intelligence in sixteenth century Scotland, returns from exile under sentence of death to clear his name. Dunnett demands attention and repays it with the most intricate historical fiction ever written. The first of six volumes. Fair warning: readers who finish this one tend to disappear for months.", "family": ["Martha"], "sources": [], "awards": [], "tags": ["Historical Fiction", "Adventure", "Epic", "Mystery"], "color": "alpenglow"}, {"id": 85, "title": "The Moviegoer", "author": "Walker Percy", "sortYear": 1961, "displayDate": "1961", "description": "Binx Bolling, a New Orleans stockbroker, drifts through Mardi Gras week watching movies and conducting what he calls the search, the one thing that keeps despair at bay. Percy's quiet National Book Award winner is the great American novel of spiritual flatness, and its diagnosis has only become more accurate. For the reader who feels fine and suspects that is the problem.", "family": ["Tom"], "sources": [], "awards": ["National Book Award (1962)"], "tags": ["Modern Classic", "Literary Fiction", "Philosophy & Ideas", "American South"], "color": "sky"}, {"id": 86, "title": "Another Country", "author": "James Baldwin", "sortYear": 1962, "displayDate": "1962", "description": "A jazz drummer's suicide sends shockwaves through a circle of friends and lovers in Greenwich Village, across every line New York pretends not to draw. Baldwin's most ambitious novel burns with anger about race, desire, and the failures of love. Nobody wrote fury and tenderness on the same page like Baldwin. Sixty years on, it still feels dangerous.", "family": ["Tom"], "sources": [], "awards": [], "tags": ["Modern Classic", "Race & Identity", "Literary Fiction"], "color": "lantern"}, {"id": 87, "title": "The Golden Notebook", "author": "Doris Lessing", "sortYear": 1962, "displayDate": "1962", "description": "Anna Wulf divides her life into four notebooks, black, red, yellow, and blue, because no single one can hold it, then attempts a fifth in gold to pull herself back together. Lessing's formal experiment became the essential novel of second-wave feminism and won her the Nobel. Demanding, fearless, and decades ahead of its moment.", "family": ["Martha"], "sources": [], "awards": ["Nobel Prize (Lessing, 2007)"], "tags": ["Modern Classic", "Feminist", "Literary Fiction"], "color": "forest"}, {"id": 88, "title": "Where the Wild Things Are", "author": "Maurice Sendak", "sortYear": 1963, "displayDate": "1963", "description": "Max, sent to bed without supper in his wolf suit, sails to where the wild things are, becomes their king, and discovers that being king is lonelier than being loved. Forty-eight pages, ten sentences, and the most influential children's book of the century. The rare picture book that means more to the adult reading it aloud than to the child listening.", "family": ["Bobby"], "sources": [], "awards": [], "tags": ["Children & Young Readers", "Classic", "Fantasy", "Short Read"], "color": "sunset"}, {"id": 89, "title": "Herzog", "author": "Saul Bellow", "sortYear": 1964, "displayDate": "1964", "description": "Moses Herzog, twice divorced and coming apart, writes furious unsent letters to friends, enemies, philosophers, and God. Bellow turned a midlife collapse into the great novel of American intellectual life, and the most generous book he ever wrote. Funny, erudite, and forgiving. The proof that a novel can be all mind and all heart at once.", "family": [], "sources": ["Oxford Curated"], "awards": ["National Book Award (1965)", "Nobel Prize (Bellow, 1976)"], "tags": ["Modern Classic", "Literary Fiction", "Comedy"], "color": "stone"}, {"id": 90, "title": "The Source", "author": "James A. Michener", "sortYear": 1965, "displayDate": "1965", "description": "An archaeological dig in northern Israel descends through fifteen levels of history, and each artifact opens into its own story, from prehistoric flint to the modern state. Michener's most ambitious doorstop and the most painless education in three thousand years of the Near East ever printed. The family's designated long-haul flight book.", "family": ["Letizia"], "sources": [], "awards": [], "tags": ["Historical Fiction", "Epic", "History"], "color": "alpenglow"}, {"id": 91, "title": "One Hundred Years of Solitude", "author": "Gabriel García Márquez", "sortYear": 1967, "displayDate": "1967", "description": "Seven generations of the Buendía family rise and fall in Macondo, a town where ghosts linger, rain lasts years, and beauty ascends to heaven with the laundry. García Márquez opened world literature to magical realism and rearranged the global canon overnight. One of the few books that genuinely deserves the word magical. Surrender to it completely.", "family": ["Tim"], "sources": ["Guardian Top 100", "Oxford Curated"], "awards": ["Nobel Prize (García Márquez, 1982)"], "tags": ["Modern Classic", "Magical Realism", "Family Saga", "Epic", "Latin America"], "color": "sky"}, {"id": 92, "title": "The Master and Margarita", "author": "Mikhail Bulgakov", "sortYear": 1967, "displayDate": "1967", "description": "The Devil arrives in Stalin's Moscow with a retinue that includes a gun-toting talking cat, and the city's literary establishment begins to unravel. Bulgakov wrote it in secret, knowing it could never be published in his lifetime, and produced the funniest and most fearless satire of the Soviet century. A book written against impossible odds, and it reads like it. Gleefully.", "family": [], "sources": ["Guardian Top 100", "Oxford Curated"], "awards": [], "tags": ["Modern Classic", "Satire", "Magical Realism", "Russia", "Fantasy"], "color": "lantern"}, {"id": 93, "title": "Do Androids Dream of Electric Sheep?", "author": "Philip K. Dick", "sortYear": 1968, "displayDate": "1968", "description": "A bounty hunter retires escaped androids across a post-apocalyptic San Francisco, in a world where real animals are status symbols and empathy is the test of humanity. The novel behind Blade Runner asks the question artificial intelligence has made urgent: what exactly makes us human? Dick's answer is stranger than the film's. Read both, argue at dinner.", "family": ["Mike"], "sources": [], "awards": [], "tags": ["Science Fiction", "Dystopia", "Philosophy & Ideas"], "color": "forest"}, {"id": 94, "title": "Slaughterhouse-Five", "author": "Kurt Vonnegut", "sortYear": 1969, "displayDate": "1969", "description": "Billy Pilgrim survives the firebombing of Dresden as a prisoner of war and comes unstuck in time, bouncing between the war, suburban America, and an alien zoo. Vonnegut waited twenty years to write about what he saw, and found the only voice that could carry it. So it goes. The most humane anti-war novel in American literature, and the funniest.", "family": [], "sources": ["Modern Library Top 100", "Oxford Curated"], "awards": [], "tags": ["Modern Classic", "War", "Science Fiction", "Satire"], "color": "sunset"}, {"id": 95, "title": "I Know Why the Caged Bird Sings", "author": "Maya Angelou", "sortYear": 1969, "displayDate": "1969", "description": "Angelou's account of growing up Black in segregated Arkansas, through trauma, silence, and the slow recovery of her voice, ends with her as a young mother at seventeen. The most influential African American autobiography since Frederick Douglass, written in prose that moves like poetry. A book about how a self is built against the odds. Every young reader should encounter it.", "family": ["Martha"], "sources": [], "awards": [], "tags": ["Modern Classic", "Memoir", "Race & Identity", "Coming of Age", "Non-Fiction"], "color": "stone"}, {"id": 96, "title": "Jonathan Livingston Seagull", "author": "Richard Bach", "sortYear": 1970, "displayDate": "1970", "description": "A seagull who cares more about the perfection of flight than the scavenging of food is cast out by his flock, and keeps flying anyway. Bach's slim fable became one of the strangest bestsellers of the seventies and a touchstone for anyone who has chosen mastery over belonging. Read it in an hour. Think about it considerably longer.", "family": ["Anne-Worley"], "sources": [], "awards": [], "tags": ["Philosophy & Ideas", "Faith & Spirit", "Short Read"], "color": "alpenglow"}, {"id": 97, "title": "Time and Again", "author": "Jack Finney", "sortYear": 1970, "displayDate": "1970", "description": "An advertising illustrator joins a secret government project and steps back into the New York of 1882, sketchbook in hand. Finney's beloved time-travel novel is really a love letter to a vanished Manhattan, meticulous enough to navigate by. The book New Yorkers press on each other. Romantic, ingenious, and complete with period photographs.", "family": ["Letizia"], "sources": [], "awards": [], "tags": ["Science Fiction", "Romance", "Historical Fiction"], "color": "sky"}, {"id": 98, "title": "Invisible Cities", "author": "Italo Calvino", "sortYear": 1972, "displayDate": "1972", "description": "Marco Polo describes fifty-five impossible cities to an aging Kublai Khan, and each one turns out to be a way of seeing the cities we actually live in. Calvino's jewel-box of a book can be read in an evening and revisited for a lifetime. Pure literary pleasure, and a favourite of architects, travellers, and dreamers everywhere.", "family": [], "sources": ["Guardian Top 100", "Oxford Curated"], "awards": [], "tags": ["Modern Classic", "Fantasy", "Philosophy & Ideas", "Short Read"], "color": "lantern"}, {"id": 99, "title": "Gravity's Rainbow", "author": "Thomas Pynchon", "sortYear": 1973, "displayDate": "1973", "description": "Rockets fall on London in the last months of the war, and an American lieutenant discovers his romantic encounters map exactly onto the strike sites. From there it gets strange. Pynchon's encyclopaedic masterpiece pushed postmodern fiction as far as English could carry it. The Everest of the modern American novel: not for every reader, unforgettable for those who summit.", "family": [], "sources": ["Oxford Curated"], "awards": ["National Book Award (1974)"], "tags": ["Modern Classic", "Epic", "War", "Satire"], "color": "forest"}, {"id": 100, "title": "Shōgun", "author": "James Clavell", "sortYear": 1975, "displayDate": "1975", "description": "An English navigator shipwrecks in 1600 Japan and rises, hostage by hostage and lesson by lesson, to advise a daimyō playing for absolute power. Clavell wrote the most propulsive thousand pages in popular fiction and smuggled a serious meditation on culture shock inside it. The book that launched a million fascinations with Japan. Clear your calendar first.", "family": ["Sue"], "sources": [], "awards": [], "tags": ["Historical Fiction", "Adventure", "Epic"], "color": "sunset"}, {"id": 101, "title": "A River Runs Through It", "author": "Norman Maclean", "sortYear": 1976, "displayDate": "1976", "description": "A retired professor remembers Montana, fly fishing, and the brilliant doomed brother he could never quite help. Maclean published his first fiction at seventy-three and produced some of the cleanest prose in American literature. In our family there was no clear line between religion and fly fishing, it begins, and the last line is even better. A small, perfect book.", "family": ["Bobby"], "sources": [], "awards": [], "tags": ["Modern Classic", "Nature & Wilderness", "Family Saga", "Memoir", "Short Read"], "color": "stone"}, {"id": 102, "title": "Interview with the Vampire", "author": "Anne Rice", "sortYear": 1976, "displayDate": "1976", "description": "Louis, two hundred years old and sick with conscience, tells a San Francisco journalist what it actually feels like to be immortal. Rice reinvented the vampire as a creature of grief and desire rather than horror, and gothic fiction has followed her ever since. Lush, melancholy, and set in a New Orleans you can smell. The book that built an empire.", "family": ["Amy"], "sources": [], "awards": [], "tags": ["Gothic", "Horror", "Fantasy"], "color": "alpenglow"}, {"id": 103, "title": "Coming into the Country", "author": "John McPhee", "sortYear": 1977, "displayDate": "1977", "description": "McPhee travels Alaska three ways: down a wild river, around the urban politics of choosing a new state capital, and deep into the bush among people who went there to disappear. The masterpiece of American place-writing, by the most quietly skilled non-fiction writer alive. For anyone who has ever looked at a map of Alaska and wondered.", "family": ["Allan"], "sources": [], "awards": [], "tags": ["Non-Fiction", "Nature & Wilderness", "History"], "color": "sky"}, {"id": 104, "title": "Grinding It Out", "author": "Ray Kroc", "sortYear": 1977, "displayDate": "1977", "description": "Kroc was fifty-two, selling milkshake machines, when he walked into a hamburger stand run by the McDonald brothers and saw the future of American business. His memoir is blunt, self-serving, and genuinely instructive about persistence, systems, and seizing the moment. A founding text of the entrepreneurial canon. Read it critically and you will learn twice as much.", "family": ["Allan"], "sources": [], "awards": [], "tags": ["Memoir", "Non-Fiction"], "color": "lantern"}, {"id": 105, "title": "Soft Energy Paths", "author": "Amory Lovins", "sortYear": 1977, "displayDate": "1977", "description": "In 1977 Lovins argued that efficiency and renewables could replace fossil fuels and nuclear power, and was dismissed as a dreamer. Half a century later the world is running his playbook. The rare policy book that called the future correctly. Read it to see what genuine foresight looks like on the page, decades before the consensus caught up.", "family": ["Allan"], "sources": [], "awards": [], "tags": ["Non-Fiction", "Philosophy & Ideas"], "color": "forest"}, {"id": 106, "title": "Daniel Martin", "author": "John Fowles", "sortYear": 1977, "displayDate": "1977", "description": "A successful English screenwriter, comfortable and quietly compromised in Hollywood, is called home by a dying friend and forced to audit his own life. Fowles considered it his most personal novel, and it is certainly his most searching. A book about second chances taken late. For readers who like their fiction unhurried and honest.", "family": ["Tom"], "sources": [], "awards": [], "tags": ["Literary Fiction", "Modern Classic"], "color": "sunset"}, {"id": 107, "title": "Prisoners of Childhood", "author": "Alice Miller", "sortYear": 1979, "displayDate": "1979", "description": "Miller showed how gifted children learn to read their parents' needs and bury their own, building accomplished adult lives over a hidden emptiness. Later published as The Drama of the Gifted Child, it reshaped how a generation understood family, achievement, and therapy. Short, piercing, and likely to explain at least one person you know. Possibly yourself.", "family": ["Allan"], "sources": [], "awards": [], "tags": ["Non-Fiction", "Philosophy & Ideas", "Short Read"], "color": "stone"}, {"id": 108, "title": "Solo Faces", "author": "James Salter", "sortYear": 1979, "displayDate": "1979", "description": "Vernon Rand climbs the great walls above Chamonix alone, pursuing a purity that ordinary life cannot offer and slowly paying its price. Salter wrote the best sentences in postwar American fiction, and here he turned them on rock, ice, and solitude. The finest climbing novel ever written. For anyone drawn to mountains, or to people who are.", "family": ["Mike"], "sources": [], "awards": [], "tags": ["Literary Fiction", "Adventure", "Nature & Wilderness"], "color": "alpenglow"}, {"id": 109, "title": "Midnight's Children", "author": "Salman Rushdie", "sortYear": 1981, "displayDate": "1981", "description": "Saleem Sinai is born at the exact stroke of India's independence, telepathically linked to a thousand other midnight children, his life tangled into his country's. Rushdie turned the postcolonial novel into magical realism's largest canvas and won the Booker, then the Booker of Bookers. Exuberant, overflowing, and the modern Indian novel against which the rest are measured.", "family": [], "sources": ["Modern Library Top 100", "Oxford Curated"], "awards": ["Booker Prize (1981)"], "tags": ["Modern Classic", "Magical Realism", "Postcolonial", "Epic", "India"], "color": "sky"}, {"id": 110, "title": "Scary Stories to Tell in the Dark", "author": "Alvin Schwartz", "sortYear": 1981, "displayDate": "1981", "description": "American folk horror collected for children and paired with Stephen Gammell's nightmare illustrations, which traumatised an entire generation on purpose. The most banned book in American school libraries, for reasons every former child understands. Campfire reading at its purest. Hand it to the next generation and watch history repeat.", "family": ["Bobby"], "sources": [], "awards": [], "tags": ["Horror", "Children & Young Readers", "Short Stories"], "color": "lantern"}, {"id": 111, "title": "The Color Purple", "author": "Alice Walker", "sortYear": 1982, "displayDate": "1982", "description": "Celie, poor, Black, and fourteen in rural Georgia, writes letters to God because no one else is listening, and across decades writes herself into a life. Walker's Pulitzer winner recovers two sisters' voices from silence and violence, and the recovery is the point. One of the essential American novels. The letters accumulate into something unforgettable.", "family": ["Bobby", "Martha"], "sources": ["Guardian Top 100", "Oxford Curated"], "awards": ["Pulitzer Prize (1983)", "National Book Award (1983)"], "tags": ["Modern Classic", "Race & Identity", "Feminist", "Family Saga", "American South"], "color": "forest"}, {"id": 112, "title": "The House of the Spirits", "author": "Isabel Allende", "sortYear": 1982, "displayDate": "1982", "description": "Four generations of the Trueba family move through love, politics, and clairvoyance as a country very like Chile drifts toward its coup. Allende began the book as a letter to her dying grandfather and opened magical realism to women's voices and wider audiences at once. Sweeping, warm, and political in the most personal way.", "family": [], "sources": ["Oxford Curated"], "awards": [], "tags": ["Magical Realism", "Family Saga", "Historical Fiction", "Latin America"], "color": "sunset"}, {"id": 113, "title": "Different Seasons", "author": "Stephen King", "sortYear": 1982, "displayDate": "1982", "description": "Four novellas, no monsters: a wrongly convicted banker in Shawshank prison, four boys walking the rails to find a body, a Nazi hiding in suburbia. King writing outside horror, and arguably at the top of his form. Two of the four became Shawshank Redemption and Stand by Me. The collection that converts King sceptics, reliably.", "family": ["Mike"], "sources": [], "awards": [], "tags": ["Short Stories", "Thriller", "Coming of Age"], "color": "stone"}, {"id": 114, "title": "The Tao of Pooh", "author": "Benjamin Hoff", "sortYear": 1982, "displayDate": "1982", "description": "Hoff explains Taoist philosophy through Winnie the Pooh, who turns out to be a master of effortless being while Owl overthinks and Eeyore catastrophises. The most accessible introduction to Eastern thought in English, and harder than it looks. A book to keep on the nightstand for the weeks when life feels like too much Rabbit and not enough Pooh.", "family": ["Anne-Worley"], "sources": [], "awards": [], "tags": ["Philosophy & Ideas", "Faith & Spirit", "Short Read"], "color": "alpenglow"}, {"id": 115, "title": "The Love You Make", "author": "Peter Brown & Steven Gaines", "sortYear": 1983, "displayDate": "1983", "description": "Brown ran the Beatles' company, stood best man at John and Yoko's wedding, and watched the whole improbable machine from inside. His account of the band's rise and unravelling remains the most intimate ever written. For the family Beatles fan, this is the one that goes beyond the myth and into the rooms where it happened.", "family": ["Amy"], "sources": [], "awards": [], "tags": ["Non-Fiction", "Biography", "Arts & Music", "History"], "color": "sky"}, {"id": 116, "title": "The Last Lion: Visions of Glory", "author": "William Manchester", "sortYear": 1983, "displayDate": "1983", "description": "Churchill from 1874 to 1932: the neglected aristocratic childhood, the cavalry charges, the wilderness years gathering. Manchester writes biography with a novelist's pacing and a historian's appetite, and this first volume is the most readable life of Churchill ever produced. History as sheer narrative pleasure. The remaining volumes will follow naturally.", "family": ["Allan"], "sources": [], "awards": [], "tags": ["Biography", "History", "Non-Fiction", "Epic"], "color": "lantern"}, {"id": 117, "title": "Winter's Tale", "author": "Mark Helprin", "sortYear": 1983, "displayDate": "1983", "description": "A burglar in a mythic New York falls in love with a dying heiress, and a white horse that may be something more carries him across a century toward a city of justice. Helprin's grand romantic fantasy divides readers into devotees and doubters, with little ground between. The devotees have the better time. Best begun on a cold night.", "family": ["Allan"], "sources": [], "awards": [], "tags": ["Fantasy", "Romance", "Epic", "Magical Realism"], "color": "forest"}, {"id": 118, "title": "The Unbearable Lightness of Being", "author": "Milan Kundera", "sortYear": 1984, "displayDate": "1984", "description": "Four lives tangle around the Prague Spring while Kundera asks whether a life lived once, without rehearsal, can carry any weight at all. The defining novel of Cold War Europe and a love story conducted as a philosophical argument. The rare book equally at home on a nightstand and a syllabus. Tereza's dog Karenin gets the most moving chapter.", "family": [], "sources": ["Oxford Curated"], "awards": [], "tags": ["Modern Classic", "Philosophy & Ideas", "Romance", "Political Fiction"], "color": "sunset"}, {"id": 119, "title": "The Handmaid's Tale", "author": "Margaret Atwood", "sortYear": 1985, "displayDate": "1985", "description": "In the Republic of Gilead, fertile women are property of the state, and Offred remembers a world where she had a name. Atwood built her theocracy entirely from things that have already happened somewhere, which is precisely why it never stops feeling possible. The essential modern dystopia. Its red cloaks have become a global protest symbol, which tells you everything.", "family": ["Mary Kate"], "sources": ["Oxford Curated"], "awards": [], "tags": ["Modern Classic", "Dystopia", "Feminist", "Science Fiction"], "color": "stone"}, {"id": 120, "title": "Blood Meridian", "author": "Cormac McCarthy", "sortYear": 1985, "displayDate": "1985", "description": "A teenage runaway joins a scalp-hunting expedition along the 1850s Mexican border, presided over by the Judge, the most terrifying figure in American fiction. McCarthy's prose owes equal debts to the King James Bible and Faulkner, and the violence is rendered as landscape. The most beautiful and most brutal American novel. Not for every reader. Unforgettable for the rest.", "family": [], "sources": ["Guardian Top 100", "Oxford Curated"], "awards": [], "tags": ["Modern Classic", "Adventure", "Historical Fiction", "Literary Fiction"], "color": "alpenglow"}, {"id": 121, "title": "Lonesome Dove", "author": "Larry McMurtry", "sortYear": 1985, "displayDate": "1985", "description": "Two retired Texas Rangers, one talkative and one silent, drive a stolen cattle herd from the Rio Grande to Montana, and the friendship at the centre carries three thousand miles of dust, loss, and perfect dialogue. McMurtry's Pulitzer winner is the great American Western and one of the great American novels, full stop. Gus McCrae may be fiction's best company.", "family": ["Charles", "Letizia", "Martha"], "sources": [], "awards": ["Pulitzer Prize (1986)"], "tags": ["Adventure", "Historical Fiction", "Epic", "Family Saga"], "color": "sky"}, {"id": 122, "title": "Niccolò Rising", "author": "Dorothy Dunnett", "sortYear": 1986, "displayDate": "1986", "description": "Claes, a dyer's apprentice in 1460s Bruges with a genius for mathematics and mischief, begins assembling a commercial empire while Europe's bankers and princes fail to see him coming. The opening of Dunnett's House of Niccolò series, the most learned historical fiction of its generation. For readers who want their history dense, devious, and brilliant.", "family": ["Letizia"], "sources": [], "awards": [], "tags": ["Historical Fiction", "Adventure", "Epic"], "color": "lantern"}, {"id": 123, "title": "Beloved", "author": "Toni Morrison", "sortYear": 1987, "displayDate": "1987", "description": "Sethe escaped slavery, but the daughter she killed to keep from being taken back has returned, and the house on Bluestone Road holds them both. Morrison wrote the novel American literature had spent a century avoiding and won the Nobel for the body of work it crowned. Demanding, haunted, and necessary. The greatest American novel of the postwar era.", "family": ["Mary Kate"], "sources": ["Guardian Top 100", "Oxford Curated"], "awards": ["Pulitzer Prize (1988)", "Nobel Prize (Morrison, 1993)"], "tags": ["Modern Classic", "Race & Identity", "Historical Fiction", "Gothic"], "color": "forest"}, {"id": 124, "title": "The Alchemist", "author": "Paulo Coelho", "sortYear": 1988, "displayDate": "1988", "description": "Santiago, an Andalusian shepherd, dreams twice of treasure at the Egyptian pyramids and sets out to find it, learning to read omens along the way. The most translated novel by a living author, pressed into more hands at more crossroads than any book of its era. A fable about listening to your own life. Simple on the surface, and that is the design.", "family": ["Anne-Worley", "Mike"], "sources": [], "awards": [], "tags": ["Philosophy & Ideas", "Faith & Spirit", "Adventure", "Short Read"], "color": "sunset"}, {"id": 125, "title": "The Remains of the Day", "author": "Kazuo Ishiguro", "sortYear": 1989, "displayDate": "1989", "description": "Stevens, the perfect English butler, drives west through the summer of 1956 to visit the housekeeper he failed to love, replaying decades of service to a master whose pol
